const ctx    = canvas.getContext('2d');
const W = canvas.width  = window.innerWidth;
const H = canvas.height = window.innerHeight;

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const CONFIG = {
  gravity:           0.007,
  groundYRatio:      0.72,
  droneCruiseAltRatio: 0.28,
  interceptSpeed:    2.7,
  interceptRadius:   16,
  fireCooldown:      90,
  aaDelay:           90,
  aaMaxActive:       8,
  aaCooldown:        180,
  platformW:         28,
  platformH:         8,
  dayLength:         10800,
  incomeInterval:    1800,
  initialBudget:     100,
  dailyIncome:       50,
  aiFireMin:         150,
  aiFireMax:         300,
  aiBuyInterval:     1800,
  deployRatio:              20,
  deployProbability:        1.0,
  maxUnitsDeployedPerCycle: Infinity,
  smartDeployment:          false,
  cityPopulation:    1000000,
  incomeGrowth:      1.1,
  crtEffect:         true,
  crtBlur:           1.8,
};
const GROUND_Y         = Math.round(H * CONFIG.groundYRatio);
const DRONE_CRUISE_ALT = Math.round(H * CONFIG.droneCruiseAltRatio);

// ─── WEAPONS ─────────────────────────────────────────────────────────────────
// Populated dynamically from weapons.js via applyWeaponsJson()
const WEAPONS = {};
const WEAPON_TYPES    = [];
const OFFENSIVE_TYPES = [];
const DEFENSIVE_TYPES = [];

// ─── CITIES config ───────────────────────────────────────────────────────────
const CITIES = [
  { xRatio: 0.10, color: '#4dd0e1', name: 'City 1', seed: 42,  side: 0 },
  { xRatio: 0.90, color: '#ef5350', name: 'City 2', seed: 99,  side: 1 },
];

// ─── SHOP layout config ──────────────────────────────────────────────────────
const SHOP_COLS    = [];
const SHOP_ROW_H   = 52;
const SHOP_COL_W   = 200;
const SHOP_COL_GAP = 2;
const SHOP_Y_OFFSET = 48;

// ─── Images ──────────────────────────────────────────────────────────────────
// Loaded dynamically from weapons.js image fields via applyWeaponsJson()
const images = {};

// ─── Audio ────────────────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(fn) {
  try { fn(audioCtx); } catch(e) {}
}


function sndLaunch(ac, vol) {
  // Heavy noise whoosh
  const buf = ac.createBuffer(1, ac.sampleRate * 0.7, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(80, ac.currentTime);
  f.frequency.exponentialRampToValueAtTime(900, ac.currentTime + 0.5);
  const gn = ac.createGain();
  src.buffer = buf; src.connect(f); f.connect(gn); gn.connect(ac.destination);
  gn.gain.setValueAtTime(0.6 * vol, ac.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.7);
  src.start(); src.stop(ac.currentTime + 0.7);
  // Deep ignition boom
  const o = ac.createOscillator(), go = ac.createGain();
  o.connect(go); go.connect(ac.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(110, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(28, ac.currentTime + 0.5);
  go.gain.setValueAtTime(0.65 * vol, ac.currentTime);
  go.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
  o.start(); o.stop(ac.currentTime + 0.5);
}

function sndExplosion(ac, vol, isNuke) {
  const dur = isNuke ? 1.4 : 0.7;
  // Same noise whoosh as launch but louder
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(80, ac.currentTime);
  f.frequency.exponentialRampToValueAtTime(900, ac.currentTime + dur * 0.7);
  const gn = ac.createGain();
  src.buffer = buf; src.connect(f); f.connect(gn); gn.connect(ac.destination);
  gn.gain.setValueAtTime(vol * 0.9, ac.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.start(); src.stop(ac.currentTime + dur);
  // Deep ignition boom
  const o = ac.createOscillator(), go = ac.createGain();
  o.connect(go); go.connect(ac.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(110, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(28, ac.currentTime + dur * 0.7);
  go.gain.setValueAtTime(vol, ac.currentTime);
  go.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur * 0.7);
  o.start(); o.stop(ac.currentTime + dur * 0.7);
}

function sndIntercept(ac) {
  // Same recipe as launch but slightly shorter/quieter
  const buf = ac.createBuffer(1, ac.sampleRate * 0.55, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(80, ac.currentTime);
  f.frequency.exponentialRampToValueAtTime(900, ac.currentTime + 0.4);
  const gn = ac.createGain();
  src.buffer = buf; src.connect(f); f.connect(gn); gn.connect(ac.destination);
  gn.gain.setValueAtTime(0.45, ac.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.55);
  src.start(); src.stop(ac.currentTime + 0.55);
  // Deep ignition thud
  const o = ac.createOscillator(), go = ac.createGain();
  o.connect(go); go.connect(ac.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(110, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(28, ac.currentTime + 0.4);
  go.gain.setValueAtTime(0.5, ac.currentTime);
  go.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
  o.start(); o.stop(ac.currentTime + 0.4);
}

function sndAALaunch(ac) {
  // Deep whoosh — low noise filtered upward
  const buf = ac.createBuffer(1, ac.sampleRate * 0.5, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(120, ac.currentTime);
  f.frequency.exponentialRampToValueAtTime(600, ac.currentTime + 0.35);
  const gn = ac.createGain();
  src.buffer = buf; src.connect(f); f.connect(gn); gn.connect(ac.destination);
  gn.gain.setValueAtTime(0.35, ac.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
  src.start(); src.stop(ac.currentTime + 0.5);
  // Low ignition thud
  const o = ac.createOscillator(), go = ac.createGain();
  o.connect(go); go.connect(ac.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(90, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(30, ac.currentTime + 0.2);
  go.gain.setValueAtTime(0.4, ac.currentTime);
  go.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
  o.start(); o.stop(ac.currentTime + 0.2);
}

function sndIncome(ac) {
  [523, 659, 784].forEach((freq, i) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sine'; o.frequency.value = freq;
    const t = ac.currentTime + i * 0.1;
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.start(t); o.stop(t + 0.2);
  });
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function lerpColor(a, b, t) {
  const ha = parseInt(a.slice(1), 16), hb = parseInt(b.slice(1), 16);
  const r = ((ha>>16)&0xff) + (((hb>>16)&0xff) - ((ha>>16)&0xff)) * t;
  const g = ((ha>>8) &0xff) + (((hb>>8) &0xff) - ((ha>>8) &0xff)) * t;
  const bl= ( ha     &0xff) + (( hb     &0xff) - ( ha     &0xff)) * t;
  return `rgb(${r|0},${g|0},${bl|0})`;
}
function fmt(b) { return `$${b}`; }
function fmtPop(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toString();
}
function dayPhase() { return dayTimer / CONFIG.dayLength; }

function makeRng(seed) {
  let n = seed;
  return () => { n = (n * 1664525 + 1013904223) & 0xffffffff; return (n >>> 0) / 0xffffffff; };
}

// ─── Layout helpers ──────────────────────────────────────────────────────────
function shopRect(col) {
  return {
    x: SHOP_COL_GAP + col * (SHOP_COL_W + SHOP_COL_GAP),
    y: GROUND_Y + SHOP_Y_OFFSET,
    w: SHOP_COL_W,
    h: SHOP_ROW_H * SHOP_COLS[col].length + 26,
  };
}
function fireButtonRect(type) {
  for (let col = 0; col < SHOP_COLS.length; col++) {
    const row = SHOP_COLS[col].indexOf(type);
    if (row < 0) continue;
    const sr = shopRect(col);
    return { x: sr.x + 63, y: sr.y + 16 + row * SHOP_ROW_H + 30, w: 44, h: 14 };
  }
  return null;
}

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
let mousePos = { x: -1, y: -1 };

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'gameover') initGame();
    else if (state === 'levelstart') { state = 'playing'; levelStartTimer = 0; }
    else if (state === 'allcomplete') { currentLevel = 1; initGame(); }
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
function canvasPos(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }

// ─── Drag (weapon placement) ──────────────────────────────────────────────────
let drag = null;
canvas.addEventListener('mousedown', e => {
  if (state === 'start') { audioCtx.resume(); state = 'levelstart'; return; }
  if (state === 'levelstart') { state = 'playing'; levelStartTimer = 0; return; }
  if (state === 'allcomplete') { currentLevel = 1; initGame(); return; }
  if (state !== 'playing') return;
  const {x: mx, y: my} = canvasPos(e);
  const p = players[0];

  // ON/OFF fire buttons
  for (const type of WEAPON_TYPES.filter(isControllable)) {
    const rect = fireButtonRect(type);
    if (!rect) continue;
    const deployed = players[0].platforms.some(pl => pl.type === type);
    if (deployed && mx >= rect.x && mx <= rect.x + rect.w && my >= rect.y && my <= rect.y + rect.h) {
      const isOn = fireState[type].freq > 0;
      fireState[type].freq = isOn ? 0 : (WEAPONS[type].shotsPerMinute || 1);
      if (!WEAPONS[type].antiballistic) {
        const plats = players[0].platforms.filter(pl => pl.type === type);
        if (fireState[type].freq > 0) {
          const interval = fireIntervalMs(type), now = performance.now();
          plats.forEach((pl, i) => { pl.nextFireTime = now + interval * (i + 1) / plats.length; });
        } else {
          plats.forEach(pl => { pl.nextFireTime = 0; });
        }
      }
      return;
    }
  }

  // Shop columns: weapon drag to place
  for (let col = 0; col < SHOP_COLS.length; col++) {
    const sr = shopRect(col);
    if (my >= sr.y && my <= sr.y + sr.h && mx >= sr.x && mx <= sr.x + sr.w) {
      SHOP_COLS[col].forEach((type, i) => {
        const w = WEAPONS[type];
        const rowY = sr.y + 16 + i * SHOP_ROW_H;
        if (my >= rowY && my <= rowY + 44 && p.budget >= w.cost)
          drag = { type, x: mx, y: my };
      });
    }
  }
});

canvas.addEventListener('mousemove', e => {
  const {x, y} = canvasPos(e);
  mousePos = {x, y};
  if (drag) { drag.x = x; drag.y = y; }
  let pointer = false;
  if (state === 'playing') {
    for (const type of WEAPON_TYPES.filter(isControllable)) {
      const btn = fireButtonRect(type);
      if (btn && x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) pointer = true;
    }
    for (let col = 0; col < SHOP_COLS.length; col++) {
      const sr = shopRect(col);
      if (x >= sr.x && x <= sr.x + sr.w && y >= sr.y && y <= sr.y + sr.h) pointer = true;
    }
  }
  canvas.style.cursor = pointer ? 'pointer' : drag ? 'grabbing' : 'default';
});

canvas.addEventListener('mouseup', e => {
  if (!drag) return;
  const {x: mx, y: my} = canvasPos(e);
  const p    = players[0];
  const plat = p.platforms.find(pl =>
    Math.abs(mx - pl.x) <= CONFIG.platformW && my >= GROUND_Y - 90 && my <= GROUND_Y + 20
  );
  if (plat && plat.type !== drag.type) {
    const w = WEAPONS[drag.type];
    if (w && p.budget >= w.cost) {
      plat.type = drag.type;
      plat.cooldown = w.weaponCooldown || CONFIG.fireCooldown;
      const fs = fireState[drag.type];
      if (fs) fs.freq = w.shotsPerMinute || 1;
      if (fs && fs.freq > 0 && !w.antiballistic) {
        const interval = fireIntervalMs(drag.type), now = performance.now();
        const plats = players[0].platforms.filter(pl => pl.type === drag.type);
        plats.forEach((pl, i) => { pl.nextFireTime = now + interval * (i + 1) / plats.length; });
      }
      p.budget -= w.cost;
    }
  }
  drag = null;
});

// ─── Buildings ───────────────────────────────────────────────────────────────
function genBgBuildings(seed) {
  const rng = makeRng(seed);
  const buildings = [];
  let rx = -110;
  while (rx < 110) {
    const w = 8 + rng() * 14, h = 55 + rng() * 85;
    buildings.push({ rx: rx + w / 2, w: Math.round(w), h: Math.round(h) });
    rx += w + 1 + rng() * 5;
  }
  return buildings;
}

function genBuildings(seed) {
  const rng = makeRng(seed);
  const buildings = [];
  let rx = -80;
  while (rx < 80) {
    const w = 10 + rng() * 18, h = 14 + rng() * 48;
    buildings.push({ rx: rx + w / 2, w: Math.round(w), h: Math.round(h) });
    rx += w + 2 + rng() * 6;
  }
  return buildings;
}

// ─── Platforms ───────────────────────────────────────────────────────────────
function makePlatforms(cityX, pointRight) {
  const gap = 34;
  const clear = 132;
  const s = pointRight ? 1 : -1;
  return Array.from({ length: 11 }, (_, idx) => ({
    x: Math.round(Math.max(20, Math.min(W - 20, cityX + s * (clear + idx * gap)))),
    type: 'empty', pointRight, cooldown: 0, nextFireTime: 0
  }));
}

// ─── Players ─────────────────────────────────────────────────────────────────
let players;
function makeCity(cfg) {
  const cityX = Math.round(W * cfg.xRatio);
  return {
    cityX, hp: CONFIG.cityPopulation, color: cfg.color, name: cfg.name,
    buildings:   genBuildings(cfg.seed),
    bgBuildings: genBgBuildings(cfg.seed + 1000),
    budget: CONFIG.initialBudget,
    platforms: makePlatforms(cityX, cfg.side === 0),
  };
}
function initPlayers() { players = CITIES.map(makeCity); }

// ─── Game state ───────────────────────────────────────────────────────────────
let state, winner, levelStartTimer = 0;
let missiles = [], interceptors = [], pendingAA = [], explosions = [], smoke = [], fires = [];
let flashMsg = null;
let currentIncome = CONFIG.dailyIncome;
let dayTimer = 0, dayCount = 1, incomeTimer = 0;

// Fire state map: type -> { freq }
let fireState = {};
function isControllable(type) { return !WEAPONS[type].defensive || WEAPONS[type].antiballistic; }
function initFireState() {
  WEAPON_TYPES.filter(isControllable).forEach(type => {
    fireState[type] = { freq: WEAPONS[type].initialFireFreq ?? 0 };
  });
}
function fireIntervalMs(type) {
  return 60000 / fireState[type].freq; // ms per shot = 60000ms/min / shotsPerMinute
}

function setFlash(t, c) { flashMsg = { text: t, color: c, ttl: 90 }; }

// ─── Computer Player AI ──────────────────────────────────────────────────────
// Self-contained module for the automatic computer opponent.
// To modify AI behaviour, only edit this object.
const ComputerPlayer = {

  _deployWeapon(type) {
    const ai = players[1];
    const empty = ai.platforms.filter(p => p.type === 'empty');
    if (!empty.length) return false;
    const pl = empty[Math.random() * empty.length | 0];
    pl.type = type;
    // Stagger nextFireTime among all platforms of this type, same as the human drop logic.
    if (!WEAPONS[type]?.antiballistic && WEAPONS[type]?.shotsPerMinute) {
      const intervalMs = 60000 / WEAPONS[type].shotsPerMinute;
      const now = performance.now();
      ai.platforms.filter(p => p.type === type)
        .forEach((p, i, arr) => { p.nextFireTime = now + intervalMs * (i + 1) / arr.length; });
    }
    return true;
  },

  init() {
    // Deploy one offensive and one antiballistic weapon at game start
    const firstOffensive     = OFFENSIVE_TYPES[0];
    const firstAntiballistic = WEAPON_TYPES.find(k => WEAPONS[k].antiballistic);
    if (firstOffensive)     this._deployWeapon(firstOffensive);
    if (firstAntiballistic) this._deployWeapon(firstAntiballistic);
  },

  // Called every budget cycle. Spends up to deployRatio% of the AI budget
  // buying randomly chosen affordable weapons until the allocation runs out
  // or there are no empty platform slots left.
  _randomPolicy() {
    const ai = players[1];
    let allocation = ai.budget * CONFIG.deployRatio / 100;
    let deployed   = 0;

    while (allocation > 0 && deployed < CONFIG.maxUnitsDeployedPerCycle) {
      const empty = ai.platforms.filter(p => p.type === 'empty');
      if (!empty.length) break;
      const affordable = WEAPON_TYPES.filter(t => WEAPONS[t].cost <= allocation && WEAPONS[t].cost <= ai.budget);
      if (!affordable.length) break;
      const type = affordable[Math.random() * affordable.length | 0];
      const cost = WEAPONS[type].cost;
      ai.budget  -= cost;
      allocation -= cost;
      this._deployWeapon(type);
      deployed++;
    }
  },

  // Smart deployment policy:
  //   1. Upgrade any deployed anti-ballistic to the fastest affordable one.
  //   2. Fill empty slots biased toward defense if humanImpactRatio is higher
  //      than computerImpactRatio, offense otherwise.
  _smartPolicy() {
    const ai = players[1];
    let allocation = ai.budget * CONFIG.deployRatio / 100;

    // Pass 1 – upgrade slower anti-ballistic weapons to faster ones.
    const abBySpeed = WEAPON_TYPES
      .filter(t => WEAPONS[t].antiballistic)
      .sort((a, b) => (WEAPONS[b].shotsPerMinute ?? 0) - (WEAPONS[a].shotsPerMinute ?? 0));

    ai.platforms.forEach(p => {
      if (!WEAPONS[p.type]?.antiballistic) return;
      const currentSPM = WEAPONS[p.type].shotsPerMinute ?? 0;
      const upgrade = abBySpeed.find(t =>
        (WEAPONS[t].shotsPerMinute ?? 0) > currentSPM &&
        WEAPONS[t].cost <= allocation &&
        WEAPONS[t].cost <= ai.budget
      );
      if (upgrade) {
        ai.budget  -= WEAPONS[upgrade].cost;
        allocation -= WEAPONS[upgrade].cost;
        p.type = upgrade;
      }
    });

    // Pass 2 – deploy into empty slots, biased by impact ratios.
    const preferDefense = Metrics.humanImpactRatio >= Metrics.computerImpactRatio;
    const abTypes  = WEAPON_TYPES.filter(t => WEAPONS[t].antiballistic);
    const offTypes = WEAPON_TYPES.filter(t => OFFENSIVE_TYPES.includes(t));
    let deployed = 0;

    while (allocation > 0 && deployed < CONFIG.maxUnitsDeployedPerCycle) {
      const empty = ai.platforms.filter(p => p.type === 'empty');
      if (!empty.length) break;
      const preferred  = (preferDefense ? abTypes  : offTypes).filter(t => WEAPONS[t].cost <= allocation && WEAPONS[t].cost <= ai.budget);
      const fallback   = (preferDefense ? offTypes : abTypes ).filter(t => WEAPONS[t].cost <= allocation && WEAPONS[t].cost <= ai.budget);
      const candidates = preferred.length ? preferred : fallback;
      if (!candidates.length) break;
      const type = candidates[Math.random() * candidates.length | 0];
      ai.budget  -= WEAPONS[type].cost;
      allocation -= WEAPONS[type].cost;
      this._deployWeapon(type);
      deployed++;
    }
  },

  // Hook called by the main update loop each time a budget cycle completes.
  onBudgetCycle() {
    if (Math.random() < CONFIG.deployProbability) {
      if (CONFIG.smartDeployment) this._smartPolicy();
      else                        this._randomPolicy();
    }
  },

  update() {
    // Mirror the human auto-fire loop: each platform fires independently
    // at the weapon's natural shotsPerMinute rate.
    const now = performance.now();
    OFFENSIVE_TYPES.forEach(type => {
      const freq = WEAPONS[type]?.shotsPerMinute;
      if (!freq) return;
      const intervalMs = 60000 / freq;
      players[1].platforms.filter(pl => pl.type === type).forEach(pl => {
        if (now >= pl.nextFireTime) {
          fireLauncher(pl, 1);
          pl.nextFireTime = now + intervalMs;
        }
      });
    });
  },
};

// ─── Metrics ─────────────────────────────────────────────────────────────────
// Tracks per-player missile fired/hit counts and exposes impact ratios.
// playerIdx 0 = human, 1 = computer.
const Metrics = {
  _fired: [0, 0],  // missiles launched by each player
  _hit:   [0, 0],  // missiles that reached the enemy city (not intercepted)

  reset() { this._fired = [0, 0]; this._hit = [0, 0]; },

  recordFired(playerIdx) { this._fired[playerIdx]++; },

  // Call when a missile explodes at the target (ground or building hit).
  recordHit(fromPlayerIdx) { this._hit[fromPlayerIdx]++; },

  // Ratio of computer missiles that impacted the human city (0–1).
  get computerImpactRatio() {
    return this._fired[1] === 0 ? 0 : this._hit[1] / this._fired[1];
  },

  // Ratio of human missiles that impacted the computer city (0–1).
  get humanImpactRatio() {
    return this._fired[0] === 0 ? 0 : this._hit[0] / this._fired[0];
  },

  // Projected ammo cost for all human deployed weapons over one budget cycle,
  // using the player-configured fire frequency (fireState[type].freq, shots/min).
  get humanAmmoCostPerCycle() {
    const cycleMin = CONFIG.incomeInterval / 3600; // frames → minutes (at 60 fps)
    return players[0].platforms.reduce((sum, pl) => {
      const freq = fireState[pl.type]?.freq;
      if (!freq) return sum;
      return sum + freq * cycleMin * shotCost(pl.type);
    }, 0);
  },

  // Projected ammo cost for all computer deployed weapons over one budget cycle,
  // using each weapon's natural shotsPerMinute (AI ignores fireState).
  get computerAmmoCostPerCycle() {
    const cycleMin = CONFIG.incomeInterval / 3600;
    return players[1].platforms.reduce((sum, pl) => {
      const freq = WEAPONS[pl.type]?.shotsPerMinute;
      if (!freq) return sum;
      return sum + freq * cycleMin * shotCost(pl.type);
    }, 0);
  },
};

function initGame() {
  applyLevelConfig(currentLevel);
  initPlayers();
  missiles = []; interceptors = []; pendingAA = []; explosions = []; smoke = []; fires = [];
  flashMsg = null; drag = null; currentIncome = CONFIG.dailyIncome;
  dayTimer = 0; dayCount = 1; incomeTimer = 0;
  Metrics.reset();
  initFireState();

  // Player starts with one antiballistic weapon deployed
  const firstAntiballistic = WEAPON_TYPES.find(k => WEAPONS[k].antiballistic);
  const p = players[0];
  const emptyP = p.platforms.filter(pl => pl.type === 'empty');
  if (firstAntiballistic && emptyP.length) {
    emptyP[0].type = firstAntiballistic;
    if (fireState[firstAntiballistic]) fireState[firstAntiballistic].freq = WEAPONS[firstAntiballistic].shotsPerMinute || 1;
  }

  ComputerPlayer.init();
  state = 'levelstart'; levelStartTimer = 0; winner = null;
}

// ─── Firing ───────────────────────────────────────────────────────────────────
function shotCost(type) { return WEAPONS[type].ammoCost / WEAPONS[type].ammoPack; }
function queueInterceptors(fromPlayer) {
  const defIdx = 1 - fromPlayer;
  const guns = players[defIdx].platforms.filter(pl => WEAPONS[pl.type]?.antiballistic && (pl.aaCooldown || 0) <= 0 && (defIdx !== 0 || fireState[pl.type]?.freq > 0));
  if (!guns.length) return;
  guns.forEach(gun => {
    if (players[defIdx].budget < shotCost(gun.type)) return;
    players[defIdx].budget -= shotCost(gun.type);
    gun.aaCooldown = CONFIG.aaCooldown;
    pendingAA.push({ countdown: CONFIG.aaDelay + (Math.random() * 60 | 0), fromX: gun.x, defIdx, speed: WEAPONS[gun.type].projectileSpeed ?? CONFIG.interceptSpeed });
  });
}

function spawnMissile(x, y, vx, vy, missileType, fromPlayer, gravityScale) {
  const w = WEAPONS[missileType] || {};
  missiles.push({ x, y, vx, vy, isNuke: !!w.isNuke, isDrone: !!w.isDrone, fromPlayer, trail: [], dead: false, missileType, gravityScale: gravityScale ?? 1, bulletSize: w.bulletSize ?? 6, bulletColor: w.bulletColor ?? '#ff7800', vol: w.volume ?? 0.5 });
  playSound(ac => sndLaunch(ac, w.volume ?? 0.5));
  queueInterceptors(fromPlayer);
}

function fireLauncher(pl, playerIdx) {
  const type = pl.type;
  const w = WEAPONS[type];
  if (pl.cooldown > 0 || players[playerIdx].budget < shotCost(type)) return false;
  const enemy = players[1 - playerIdx];
  const dx = enemy.cityX - pl.x, dist = Math.abs(dx), dir = Math.sign(dx);
  const isNuke = !!w.isNuke;
  const minDeg = w.trajectoryAngleMin ?? (isNuke ? 44 : 48);
  const maxDeg = w.trajectoryAngleMax ?? (isNuke ? 54 : 58);
  const angleBase = (minDeg + Math.random() * (maxDeg - minDeg)) * Math.PI / 180;
  const spread = (Math.random() - 0.5) * (isNuke ? 5 : 3) * Math.PI / 180;
  const angle = Math.max(0.3, Math.min(1.1, angleBase + spread));
  const k = w.projectileSpeed ?? 1.0;
  const spd = Math.sqrt((CONFIG.gravity * dist) / Math.max(0.01, Math.sin(2 * angle))) * k;
  spawnMissile(pl.x, GROUND_Y - 5, dir * Math.cos(angle) * spd, -Math.sin(angle) * spd, type, playerIdx, k * k);
  players[playerIdx].budget -= shotCost(type);
  pl.cooldown = w.weaponCooldown || CONFIG.fireCooldown;
  Metrics.recordFired(playerIdx);
  return true;
}

function launchInterceptor(fromX, defIdx, speed = CONFIG.interceptSpeed) {
  const targets = missiles.filter(m => m.fromPlayer === 1 - defIdx && !m.dead);
  if (!targets.length || interceptors.length >= CONFIG.aaMaxActive) return;
  const ay = GROUND_Y - 10;
  let target = targets[0], nearDist = Infinity;
  targets.forEach(m => { const d = Math.hypot(m.x - players[defIdx].cityX, m.y - GROUND_Y); if (d < nearDist) { nearDist = d; target = m; } });
  const dist = Math.hypot(target.x - fromX, target.y - ay);
  const leadT = dist / speed;
  const px = target.x + target.vx * leadT;
  const py = target.y + target.vy * leadT + 0.5 * CONFIG.gravity * leadT * leadT;
  const aimX = py >= GROUND_Y ? target.x : px;
  const aimY = py >= GROUND_Y ? target.y : py;
  const dx = aimX - fromX, dy = aimY - ay, d = Math.sqrt(dx*dx + dy*dy) || 1;
  interceptors.push({ x: fromX, y: ay, vx: (dx/d)*speed, vy: (dy/d)*speed, trail: [], dead: false, defIdx, speed });
  playSound(sndAALaunch);
}

// ─── Update ───────────────────────────────────────────────────────────────────
function hitsCity(p, m) {
  const alive = Math.ceil((p.hp / CONFIG.cityPopulation) * p.buildings.length);
  for (let i = 0; i < alive; i++) {
    const b = p.buildings[i], bx = p.cityX + b.rx, by = GROUND_Y - b.h;
    if (m.x >= bx - b.w/2 - 1 && m.x <= bx + b.w/2 + 1 && m.y >= by && m.y <= by + b.h) return true;
  }
  return false;
}

function applyDamage(x, y, missileType) {
  const w = WEAPONS[missileType] || WEAPONS[OFFENSIVE_TYPES[0]] || {};
  const r = w.explRadius + 45;
  players.forEach(p => {
    const d = Math.hypot(p.cityX - x, GROUND_Y - y);
    if (d < r) p.hp = Math.max(0, p.hp - Math.round((1 - d / r) * w.damage));
  });
}

const LEVEL_START_DURATION = 180; // frames (~3s at 60fps)

function update() {
  if (state === 'levelstart') {
    if (++levelStartTimer >= LEVEL_START_DURATION) { state = 'playing'; levelStartTimer = 0; }
    return;
  }
  if (state !== 'playing') return;

  if (flashMsg && --flashMsg.ttl <= 0) flashMsg = null;
  players.forEach(p => p.platforms.forEach(pl => {
    if (pl.cooldown > 0) pl.cooldown--;
    if (pl.aaCooldown > 0) pl.aaCooldown--;
  }));

  // Day / night cycle
  dayTimer++;
  if (dayTimer >= CONFIG.dayLength) { dayTimer = 0; dayCount++; }

  // Income every interval
  incomeTimer++;
  if (incomeTimer >= CONFIG.incomeInterval) {
    incomeTimer = 0;
    players[0].budget += currentIncome;
    players[1].budget += currentIncome;
    setFlash(`+${fmt(currentIncome)}`, '#ffb300');
    currentIncome = Math.round(currentIncome * (CONFIG.incomeGrowth ?? 1.1));
    ComputerPlayer.onBudgetCycle();
  }

  // Auto-fire player platforms — each platform fires independently
  const now = performance.now();
  OFFENSIVE_TYPES.forEach(type => {
    const freq = fireState[type].freq;
    if (freq <= 0) return;
    players[0].platforms.filter(pl => pl.type === type).forEach(pl => {
      if (now >= pl.nextFireTime) {
        fireLauncher(pl, 0);
        pl.nextFireTime = now + fireIntervalMs(type);
      }
    });
  });

  // AI update
  ComputerPlayer.update();

  // Missiles
  missiles.forEach(m => {
    if (m.dead) return;
    if (m.isDrone) {
      const enemy = players[1 - m.fromPlayer];
      const distToEnemy = Math.abs(m.x - enemy.cityX);
      const cruiseY = GROUND_Y - DRONE_CRUISE_ALT;
      if (distToEnemy > 60) { m.vy += (cruiseY - m.y) * 0.05; m.vy *= 0.82; m.vy = Math.max(-3, Math.min(1.5, m.vy)); }
      else { m.vy += CONFIG.gravity * m.gravityScale * 2.5; }
    } else { m.vy += CONFIG.gravity * m.gravityScale; }
    m.x += m.vx; m.y += m.vy;
    if (m.x < 0 || m.x >= W || m.y > H + 20) { m.dead = true; return; }
    const explode = (hx, hy) => {
      applyDamage(hx, hy, m.missileType);
      Metrics.recordHit(m.fromPlayer);
      const isNukeType = !!WEAPONS[m.missileType].isNuke;
      const maxR = WEAPONS[m.missileType].explRadius;
      explosions.push({ x: hx, y: hy, r: 2, maxR, alpha: 1, nuke: isNukeType, age: 0, phase: 'expand' });
      spawnSmoke(hx, hy, isNukeType ? 35 : 18);
      playSound(ac => sndExplosion(ac, m.vol, isNukeType));
      m.dead = true;
    };
    if (m.y >= GROUND_Y) { explode(m.x, m.y); return; }
    if (hitsCity(players[1 - m.fromPlayer], m)) { explode(m.x, m.y); }
  });
  missiles = missiles.filter(m => !m.dead);

  for (let i = pendingAA.length - 1; i >= 0; i--) {
    if (--pendingAA[i].countdown <= 0) {
      launchInterceptor(pendingAA[i].fromX, pendingAA[i].defIdx, pendingAA[i].speed);
      pendingAA.splice(i, 1);
    }
  }

  interceptors.forEach(ic => {
    if (ic.dead) return;
    const enemyMissiles = missiles.filter(m => m.fromPlayer === 1 - ic.defIdx && !m.dead);
    let nearest = null, nearDist = Infinity;
    enemyMissiles.forEach(m => { const d = Math.hypot(m.x - ic.x, m.y - ic.y); if (d < nearDist) { nearDist = d; nearest = m; } });
    if (!nearest) { ic.dead = true; return; }
    const dx = nearest.x - ic.x, dy = nearest.y - ic.y, d = Math.sqrt(dx*dx + dy*dy) || 1;
    ic.vx += ((dx/d)*ic.speed - ic.vx) * 0.10;
    ic.vy += ((dy/d)*ic.speed - ic.vy) * 0.10;
    const cs = Math.sqrt(ic.vx**2 + ic.vy**2) || 1;
    ic.vx = (ic.vx/cs)*ic.speed; ic.vy = (ic.vy/cs)*ic.speed;
    ic.x += ic.vx; ic.y += ic.vy;
    if (nearDist < CONFIG.interceptRadius) {
      explosions.push({ x: nearest.x, y: nearest.y, r: 2, maxR: 10, alpha: 1, nuke: false, age: 0, phase: 'expand' });
      nearest.dead = true; ic.dead = true;
      spawnSmoke(nearest.x, nearest.y, 10);
      playSound(sndIntercept);
    }
    if (ic.x < 0 || ic.x >= W || ic.y > H || ic.y >= GROUND_Y) ic.dead = true;
  });
  interceptors = interceptors.filter(ic => !ic.dead);
  missiles     = missiles.filter(m  => !m.dead);

  if (players[0].hp <= 0) { winner = 1; state = 'gameover'; return; }
  if (players[1].hp <= 0) {
    const totalLevels = (typeof GAME_DATA !== 'undefined' && GAME_DATA.levels) ? GAME_DATA.levels.length : 1;
    if (currentLevel >= totalLevels) { state = 'allcomplete'; return; }
    currentLevel++;
    initGame();
    return;
  }

  explosions.forEach(e => {
    e.age++;
    const expandFrames = e.nuke ? 22 : 12;
    const blinkFrames  = e.nuke ? 90 : 50;
    const fadeFrames   = e.nuke ? 80 : 40;
    if (e.phase === 'expand') {
      e.r += (e.maxR - e.r) * 0.18;
      if (e.age >= expandFrames) { e.phase = 'blink'; e.age = 0; e.r = e.maxR; }
    } else if (e.phase === 'blink') {
      e.alpha = 0.55 + 0.45 * Math.sin(e.age * 0.45);
      if (e.age >= blinkFrames) { e.phase = 'fade'; e.age = 0; }
    } else {
      e.alpha = 1 - e.age / fadeFrames;
    }
  });
  explosions = explosions.filter(e => e.alpha > 0);
  updateSmoke();
  updateFires();
}

// ─── Draw ────────────────────────────────────────────────────────────────────
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, '#1a1a1a'); g.addColorStop(1, '#2a2a2a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 90; i++) ctx.fillRect((i*173+41)%W, (i*101+13)%(GROUND_Y*0.76), 1, 1);

  // Moon
  const mx = W * 0.72, my = GROUND_Y * 0.18, mr = 13;
  ctx.save();
  ctx.shadowColor = 'rgba(235,230,200,0.8)';
  ctx.shadowBlur = 18;
  ctx.fillStyle = 'rgba(235,230,200,1)';
  ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawTerrain() {
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
}

function drawWeaponAt(type, cx, sy, right) {
  const w = WEAPONS[type];
  if (!w) return;
  const img = images[w.image];
  const scale = w.imageScale || 0.45;
  const dw = w.imageW * scale, dh = w.imageH * scale;
  ctx.save();
  ctx.translate(cx, sy - dh / 2);
  if (!right) ctx.scale(-1, 1);
  ctx.drawImage(img, -dw / 2, -dh / 2, dw, dh);
  ctx.restore();
}

function drawPlatforms(p) {
  p.platforms.forEach(pl => {
    if (pl.type === 'empty') return;
    ctx.globalAlpha = p.budget >= shotCost(pl.type) ? 1 : 0.45;
    drawWeaponAt(pl.type, pl.x, GROUND_Y, pl.pointRight);
    ctx.globalAlpha = 1;
  });
}

function drawBgCity(p) {
  const WIN_COLORS = [
    'rgba(180,210,240,0.7)',
    'rgba(220,190,120,0.5)',
    'rgba(200,225,255,0.5)',
  ];
  p.bgBuildings.forEach((b, i) => {
    const bx = p.cityX + b.rx, by = GROUND_Y - b.h;
    ctx.fillStyle = '#161616'; ctx.fillRect(bx - b.w/2, by, b.w, b.h);
    ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 1; ctx.strokeRect(bx - b.w/2, by, b.w, b.h);
    const winColor = WIN_COLORS[i % 3];
    ctx.save();
    for (let wy = by+8; wy < by+b.h-5; wy += 6) {
      for (let wx = bx-b.w/2+4; wx < bx+b.w/2-4; wx += 5) {
        const hash = ((wx * 73856093) ^ (wy * 19349663)) >>> 0;
        const lit = (hash % 3) !== 0;
        if (lit) {
          ctx.shadowColor = winColor;
          ctx.shadowBlur = 3;
          ctx.fillStyle = winColor;
        } else {
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#252525';
        }
        ctx.fillRect(wx, wy, 2, 3);
      }
    }
    ctx.restore();
  });
}

function drawCity(p) {
  const alive = Math.ceil((p.hp / CONFIG.cityPopulation) * p.buildings.length);
  p.buildings.forEach((b, i) => {
    const bx = p.cityX + b.rx, by = GROUND_Y - b.h;
    if (i >= alive) { ctx.fillStyle = '#111'; ctx.fillRect(bx - b.w/2, GROUND_Y-4, b.w, 4); return; }
    ctx.fillStyle = '#111'; ctx.fillRect(bx - b.w/2, by, b.w, b.h);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.strokeRect(bx - b.w/2, by, b.w, b.h);
    const WIN_COLORS = [
      'rgba(240,165,40,1)',
      'rgba(235,235,210,1)',
      'rgba(255,220,80,1)',
    ];
    const winColor = WIN_COLORS[i % 3];
    ctx.save();
    for (let wy = by+9; wy < by+b.h-6; wy += 8) {
      for (let wx = bx-b.w/2+6; wx < bx+b.w/2-6; wx += 6) {
        const hash = ((wx * 73856093) ^ (wy * 19349663)) >>> 0;
        const lit = (hash % 3) !== 0;
        if (lit) {
          ctx.shadowColor = winColor;
          ctx.shadowBlur = 6;
          ctx.fillStyle = winColor;
        } else {
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#2e2e2e';
        }
        ctx.fillRect(wx, wy, 3, 4);
      }
    }
    // Red rooftop warning light on some buildings
    if (i % 3 === 1 && b.h > 28) {
      const lx = bx + b.w / 2 - 2, ly = by - 1;
      const flicker = 0.7 + 0.3 * Math.sin(performance.now() / 600 + i);
      ctx.save();
      ctx.shadowColor = `rgba(220,40,40,${0.9 * flicker})`;
      ctx.shadowBlur = 7;
      ctx.fillStyle = `rgba(220,40,40,${flicker})`;
      ctx.beginPath(); ctx.arc(lx, ly, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  });
}

function spawnFire(x, y, isNuke) {
  const spread = isNuke ? 55 : 28;
  const count  = isNuke ? 12 : 6;
  for (let i = 0; i < count; i++) {
    fires.push({
      x: x + (Math.random() - 0.5) * spread,
      y: GROUND_Y,
      spread,
      life: 0.7 + Math.random() * 0.6,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function updateFires() {
  fires.forEach(f => { f.life -= 0.0008 + Math.random() * 0.0004; });
  fires = fires.filter(f => f.life > 0);
}

function drawFires() {
  const t = performance.now() / 1000;
  fires.forEach(f => {
    const flicker = 0.6 + 0.4 * Math.sin(t * 8 + f.phase);
    const h = (18 + f.spread * 0.6) * f.life * flicker;
    const r = (6 + f.spread * 0.25) * f.life * flicker;
    const a = Math.min(1, f.life * 1.5);
    // Outer orange
    const g1 = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y - h * 0.4, r);
    g1.addColorStop(0,   `rgba(255,200,50,${a * 0.9})`);
    g1.addColorStop(0.4, `rgba(255,80,0,${a * 0.7})`);
    g1.addColorStop(1,   `rgba(180,20,0,0)`);
    ctx.beginPath(); ctx.arc(f.x, f.y - h * 0.3, r, 0, Math.PI * 2);
    ctx.fillStyle = g1; ctx.fill();
    // Inner bright core
    const g2 = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r * 0.4);
    g2.addColorStop(0, `rgba(255,255,200,${a})`);
    g2.addColorStop(1, `rgba(255,150,0,0)`);
    ctx.beginPath(); ctx.arc(f.x, f.y, r * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = g2; ctx.fill();
  });
}

function spawnSmoke(x, y, count) {
  for (let i = 0; i < count * 2; i++) {
    smoke.push({
      x: x + (Math.random() - 0.5) * 20,
      y: y + (Math.random() - 0.5) * 10,
      vx: (Math.random() - 0.5) * 0.12,
      vy: -(0.03 + Math.random() * 0.07),
      r: 6 + Math.random() * 10,
      alpha: 0.18 + Math.random() * 0.12,
      life: 1.0,
      decay: 0.0003 + Math.random() * 0.0002,
      black: Math.random() < 0.3,
    });
  }
}

function updateSmoke() {
  smoke.forEach(s => {
    s.x += s.vx; s.y += s.vy;
    s.r += 0.04;
    s.life -= s.decay;
    s.alpha = s.life * 0.22;
  });
  smoke = smoke.filter(s => s.life > 0);
}

function drawSmoke() {
  smoke.forEach(s => {
    const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r);
    if (s.black) {
      g.addColorStop(0,   `rgba(10,10,10,${s.alpha})`);
      g.addColorStop(0.5, `rgba(5,5,5,${s.alpha * 0.5})`);
      g.addColorStop(1,   `rgba(0,0,0,0)`);
    } else {
      g.addColorStop(0,   `rgba(90,90,90,${s.alpha})`);
      g.addColorStop(0.5, `rgba(60,60,60,${s.alpha * 0.5})`);
      g.addColorStop(1,   `rgba(40,40,40,0)`);
    }
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = g; ctx.fill();
  });
}

function drawFireball(x, y, r, inner, outer) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0,   `rgba(255,255,200,1)`);
  g.addColorStop(0.25, inner);
  g.addColorStop(0.7,  outer);
  g.addColorStop(1,   `rgba(0,0,0,0)`);
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill();
}

function hexToRgba(hex, a) {
  const n = parseInt(hex.replace('#',''), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

function drawMissiles() {
  missiles.forEach(m => {
    const r = m.bulletSize;
    const inner = hexToRgba(m.bulletColor, 1);
    const outer  = hexToRgba(m.bulletColor, 0);
    drawFireball(m.x, m.y, r, inner, outer);
  });
}

function drawInterceptors() {
  interceptors.forEach(ic => {
    drawFireball(ic.x, ic.y, 4, `rgba(255,120,0,1)`, `rgba(180,40,0,0)`);
  });
}

function drawExplosions() {
  explosions.forEach(({ x, y, r, alpha, nuke, phase }) => {
    const a = Math.max(0, Math.min(1, alpha));
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0,   `rgba(255,255,200,${a})`);
    g.addColorStop(0.3, `rgba(255,160,0,${a})`);
    g.addColorStop(0.7, `rgba(200,40,0,${a*0.8})`);
    g.addColorStop(1,   `rgba(80,10,0,0)`);
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill();
  });
}

function drawShop() {
  const p = players[0];
  SHOP_COLS.forEach((types, col) => {
    const sr = shopRect(col);
    ctx.fillStyle = 'rgba(0,0,0,0.82)'; ctx.fillRect(sr.x, sr.y, sr.w, sr.h);
    ctx.strokeStyle = '#37474f'; ctx.lineWidth = 1; ctx.strokeRect(sr.x, sr.y, sr.w, sr.h);
    types.forEach((type, i) => {
      const w = WEAPONS[type];
      const rowY = sr.y + 16 + i * SHOP_ROW_H;
      const canBuy = p.budget >= w.cost;
      if (i > 0) {
        ctx.strokeStyle = '#2a3a42'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(sr.x + 4, rowY - 4); ctx.lineTo(sr.x + sr.w - 4, rowY - 4); ctx.stroke();
      }
      ctx.fillStyle = '#3a3a3a'; ctx.fillRect(sr.x + 5, rowY, 52, 44);
      ctx.globalAlpha = canBuy ? 1 : 0.4;
      drawWeaponAt(type, sr.x + 31, rowY + 24, true);
      ctx.globalAlpha = 1;
      ctx.textAlign = 'left';
      ctx.font = 'bold 12px monospace'; ctx.fillStyle = canBuy ? '#fff' : '#555';
      ctx.fillText(w.label, sr.x + 63, rowY + 15);
      ctx.font = '10px monospace'; ctx.fillStyle = canBuy ? '#ccc' : '#555';
      ctx.fillText(`$${w.cost} / $${w.ammoCost / w.ammoPack}`, sr.x + 63, rowY + 28);
      if (isControllable(type)) {
        const btn = fireButtonRect(type);
        const deployed = players[0].platforms.some(pl => pl.type === type);
        const isOn = fireState[type].freq > 0;
        ctx.globalAlpha = deployed ? 1 : 0.25;
        ctx.fillStyle = isOn ? '#1b5e20' : '#333';
        ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
        ctx.strokeStyle = isOn ? '#4caf50' : '#555';
        ctx.lineWidth = 1; ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);
        ctx.font = 'bold 10px monospace';
        ctx.fillStyle = isOn ? '#4caf50' : '#777';
        ctx.textAlign = 'center';
        ctx.fillText(isOn ? 'ON' : 'OFF', btn.x + btn.w / 2, btn.y + btn.h - 3);
        ctx.globalAlpha = 1;
      }
    });
  });
}

function drawDrag() {
  if (!drag) return;
  ctx.globalAlpha = 0.82;
  drawWeaponAt(drag.type, drag.x, drag.y, true);
  ctx.globalAlpha = 1;
  players[0].platforms.filter(pl => pl.type !== drag.type).forEach(pl => {
    ctx.save(); ctx.strokeStyle='rgba(255,255,100,0.5)'; ctx.lineWidth=1.5; ctx.setLineDash([3,3]);
    ctx.strokeRect(pl.x - CONFIG.platformW/2, GROUND_Y - 32, CONFIG.platformW, 32);
    ctx.setLineDash([]); ctx.restore();
  });
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.60)'; ctx.fillRect(0, 0, W, 48);

  // HP bars at top
  const bw = 200, bh = 10, margin = 12, barY = 10;
  players.forEach((p, i) => {
    const ratio = p.hp / CONFIG.cityPopulation;
    const barX = i === 0 ? margin : W - margin - bw;
    ctx.fillStyle = '#111'; ctx.fillRect(barX, barY, bw, bh);
    ctx.fillStyle = ratio > 0.5 ? '#4caf50' : ratio > 0.25 ? '#ff9800' : '#f44336';
    ctx.fillRect(barX, barY, bw * ratio, bh);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, bw, bh);
    ctx.font = 'bold 11px monospace'; ctx.fillStyle = '#ccc';
    ctx.textAlign = i === 0 ? 'left' : 'right';
    ctx.fillText(`${p.name}  ${fmtPop(p.hp)} population`, i === 0 ? barX : barX + bw, barY + bh + 13);
  });

  // Budget
  ctx.textAlign = 'left'; ctx.font = 'bold 22px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(fmt(players[0].budget), W/2 - 40, 30);

  if (flashMsg) {
    ctx.textAlign = 'left'; ctx.font = 'bold 14px monospace'; ctx.fillStyle = flashMsg.color;
    ctx.globalAlpha = Math.min(1, flashMsg.ttl / 25); ctx.fillText(flashMsg.text, W/2 - 40, 48); ctx.globalAlpha = 1;
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0, 0, W, H);
  const p = players[winner];
  ctx.textAlign = 'center'; ctx.font = 'bold 48px monospace'; ctx.fillStyle = p.color;
  ctx.fillText(`${p.name} WINS`, W/2, H/2 - 16);
  ctx.font = '16px monospace'; ctx.fillStyle = '#999';
  ctx.fillText('Press SPACE to play again', W/2, H/2 + 30);
}

function drawAllComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 38px monospace'; ctx.fillStyle = '#ffd600';
  ctx.fillText('ALL LEVELS COMPLETED. YOU WON', W/2, H/2 - 24);
  ctx.font = 'bold 22px monospace'; ctx.fillStyle = '#e0e0e0';
  ctx.fillText('No to war', W/2, H/2 + 22);
  ctx.font = '14px monospace'; ctx.fillStyle = '#555';
  ctx.fillText('Press SPACE to play again', W/2, H/2 + 60);
}

function drawLevelStart() {
  ctx.fillStyle = 'rgba(0,0,0,0.80)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 22px monospace'; ctx.fillStyle = '#555';
  ctx.fillText('GET READY', W/2, H/2 - 52);
  ctx.font = 'bold 72px monospace'; ctx.fillStyle = '#e0e0e0';
  ctx.fillText(`LEVEL ${currentLevel}`, W/2, H/2 + 16);
  const remaining = Math.ceil((LEVEL_START_DURATION - levelStartTimer) / 60);
  ctx.font = '16px monospace'; ctx.fillStyle = '#555';
  ctx.fillText(`Starting in ${remaining}… or click`, W/2, H/2 + 58);
}

function drawStartScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 52px monospace'; ctx.fillStyle = '#e0e0e0';
  ctx.fillText('SHAHED', W/2, H/2 - 30);
  ctx.font = '16px monospace'; ctx.fillStyle = '#666';
  ctx.font = '20px monospace'; ctx.fillStyle = '#888';
  ctx.fillText('Click to start', W/2, H/2 + 65);
}

// ─── CRT Effect ──────────────────────────────────────────────────────────────
const crtCanvas = document.getElementById('crtCanvas');
const crtCtx    = crtCanvas.getContext('2d');
crtCanvas.width = W; crtCanvas.height = H;

// Pre-render static parts (scanlines + vignette) once
const crtStatic = document.createElement('canvas');
crtStatic.width = W; crtStatic.height = H;
const crtSCtx = crtStatic.getContext('2d');
(function buildCRTStatic() {
  for (let y = 0; y < H; y += 2) {
    crtSCtx.fillStyle = 'rgba(0,0,0,0.40)';
    crtSCtx.fillRect(0, y, W, 1);
  }
})();

function drawCRT() {
  if (!CONFIG.crtEffect) { crtCtx.clearRect(0, 0, W, H); canvas.style.filter = ''; return; }
  canvas.style.filter = `blur(${CONFIG.crtBlur}px)`;
  crtCtx.clearRect(0, 0, W, H);
  crtCtx.drawImage(crtStatic, 0, 0);

  // Flicker — occasional strong pulse
  const flicker = Math.random() < 0.03
    ? 0.08 + Math.random() * 0.10          // rare bright flash
    : Math.random() * 0.06;
  crtCtx.fillStyle = `rgba(0,0,0,${flicker})`;
  crtCtx.fillRect(0, 0, W, H);

}

// ─── Loop ────────────────────────────────────────────────────────────────────
function loop() {
  if (state !== 'start') update();
  drawSky(); drawTerrain();
  drawPlatforms(players[0]);
  drawPlatforms(players[1]);
  players.forEach(drawBgCity);
  players.forEach(drawCity);
  drawSmoke(); drawFires(); drawMissiles(); drawInterceptors(); drawExplosions();
  if (state === 'start') {
    drawStartScreen();
  } else if (state === 'levelstart') {
    drawLevelStart();
  } else if (state === 'playing') {
    drawHUD(); drawShop(); drawDrag();
  } else if (state === 'gameover') {
    drawHUD(); drawGameOver();
  } else if (state === 'allcomplete') {
    drawAllComplete();
  }
  document.getElementById('authorLink').style.display = state === 'start' ? 'block' : 'none';
  drawCRT();
  requestAnimationFrame(loop);
}

function applyWeaponsJson(json) {
  const data = json.weapons;
  // Clear existing weapon data
  Object.keys(WEAPONS).forEach(k => delete WEAPONS[k]);
  WEAPON_TYPES.length = 0; OFFENSIVE_TYPES.length = 0; DEFENSIVE_TYPES.length = 0;
  SHOP_COLS.length = 0;

  const sortedEntries = Object.entries(data)
    .sort((a, b) => a[1].shopPosition - b[1].shopPosition);
  const numCols = Math.ceil(sortedEntries.length / 3);
  for (let i = 0; i < numCols; i++) SHOP_COLS.push([]);
  sortedEntries.forEach(([type, d], idx) => {
      const dmg = d.damage ?? 0;
      WEAPONS[type] = {
        label:              d.name               ?? type,
        cost:               d.price              ?? 0,
        ammoCost:           d.ammoPrice          ?? 0,
        ammoPack:           1,
        damage:             dmg,
        defensive:          d.defensive          ?? false,
        antiballistic:      d.antiballistic      ?? false,
        isNuke:             dmg >= 400000,
        initialFireFreq:    d.initialFireFrequency ?? 0,
        shotsPerMinute:     d.shotsPerMinute     ?? 60,
        trajectoryAngleMin: d.trajectoryAngleMin ?? 48,
        trajectoryAngleMax: d.trajectoryAngleMax ?? 58,
        projectileSpeed:    d.projectileSpeed    ?? 1.0,
        explRadius:         d.defensive ? 0 : (d.explRadius ?? 30),
        bulletSize:         d.bulletSize  ?? 6,
        bulletColor:        d.bulletColor ?? '#ff7800',
        volume:             (d.volume ?? 50) / 100,
        weaponCooldown:     CONFIG.fireCooldown,
        image:              d.image              ?? '',
        imageW:             76,
        imageH:             48,
        imageScale:         0.45,
      };
      if (d.image && !images[d.image]) {
        images[d.image] = new Image(); images[d.image].src = d.image;
      }
      WEAPON_TYPES.push(type);
      (WEAPONS[type].defensive ? DEFENSIVE_TYPES : OFFENSIVE_TYPES).push(type);
      const col = Math.floor(idx / 3);
      SHOP_COLS[col].push(type);
    });
}

let currentLevel = 1;

function applyLevelConfig(level) {
  if (typeof GAME_DATA === 'undefined' || !GAME_DATA.levels) return;
  const lv = GAME_DATA.levels[level - 1] ?? GAME_DATA.levels[GAME_DATA.levels.length - 1];
  if (lv.initialBudget        !== undefined) CONFIG.initialBudget  = lv.initialBudget;
  if (lv.incomeInterval       !== undefined) CONFIG.incomeInterval = lv.incomeInterval;
  if (lv.dailyIncome          !== undefined) CONFIG.dailyIncome    = lv.dailyIncome;
  if (lv.incomeGrowthPercent  !== undefined) CONFIG.incomeGrowth   = 1 + lv.incomeGrowthPercent / 100;
  if (lv.cityPopulation       !== undefined) CONFIG.cityPopulation = lv.cityPopulation;
  if (lv.deployRatio              !== undefined) CONFIG.deployRatio             = lv.deployRatio;
  if (lv.deployProbability        !== undefined) CONFIG.deployProbability       = lv.deployProbability;
  if (lv.maxUnitsDeployedPerCycle !== undefined) CONFIG.maxUnitsDeployedPerCycle = lv.maxUnitsDeployedPerCycle;
  if (lv.smartDeployment          !== undefined) CONFIG.smartDeployment          = lv.smartDeployment;
}

if (typeof WEAPONS_DATA !== 'undefined') applyWeaponsJson(WEAPONS_DATA);
if (typeof GAME_DATA !== 'undefined') {
  if (GAME_DATA.crtEffect !== undefined) CONFIG.crtEffect = GAME_DATA.crtEffect;
  if (GAME_DATA.crtBlur   !== undefined) CONFIG.crtBlur   = GAME_DATA.crtBlur;
}
applyLevelConfig(currentLevel);
initGame(); state = 'start'; levelStartTimer = 0; loop();
</script>
