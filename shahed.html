<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>City Siege</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }
    body { background: #0a0a0a; font-family: monospace; }
    canvas { display: block; touch-action: none; }
    #rotate-msg {
      display: none;
      position: fixed; inset: 0;
      background: #0a0a0a;
      color: #ccc;
      font-family: monospace;
      font-size: 18px;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 10;
    }
    @media (orientation: portrait) {
      #rotate-msg { display: flex; }
      canvas { display: none; }
    }
  </style>
</head>
<body>
<div id="rotate-msg">&#x21BA; Please rotate your device to landscape</div>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width  = window.innerWidth;
const H = canvas.height = window.innerHeight;

// ─── Images ───────────────────────────────────────────────────────────────────
const imgInterceptor = new Image(); imgInterceptor.src = 'interceptor.png';
const imgLauncher    = new Image(); imgLauncher.src    = 'launcher1.png';
const imgNukeLauncher = new Image(); imgNukeLauncher.src = 'launcher3.png';

// ─── Audio ────────────────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(fn) {
  try { fn(audioCtx); } catch(e) {}
}

function sndLaunch(ac) {
  // Heavy noise whoosh
  const buf = ac.createBuffer(1, ac.sampleRate * 0.7, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(80, ac.currentTime);
  f.frequency.exponentialRampToValueAtTime(900, ac.currentTime + 0.5);
  const gn = ac.createGain();
  src.buffer = buf; src.connect(f); f.connect(gn); gn.connect(ac.destination);
  gn.gain.setValueAtTime(0.6, ac.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.7);
  src.start(); src.stop(ac.currentTime + 0.7);
  // Deep ignition boom
  const o = ac.createOscillator(), go = ac.createGain();
  o.connect(go); go.connect(ac.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(110, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(28, ac.currentTime + 0.5);
  go.gain.setValueAtTime(0.65, ac.currentTime);
  go.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
  o.start(); o.stop(ac.currentTime + 0.5);
}

function sndExplosion(ac, isNuke) {
  const vol = isNuke ? 1.2 : 1.0;
  const dur = isNuke ? 1.4 : 0.7;
  // Same noise whoosh as launch but louder
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(80, ac.currentTime);
  f.frequency.exponentialRampToValueAtTime(900, ac.currentTime + dur * 0.7);
  const gn = ac.createGain();
  src.buffer = buf; src.connect(f); f.connect(gn); gn.connect(ac.destination);
  gn.gain.setValueAtTime(vol * 0.9, ac.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.start(); src.stop(ac.currentTime + dur);
  // Deep ignition boom
  const o = ac.createOscillator(), go = ac.createGain();
  o.connect(go); go.connect(ac.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(110, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(28, ac.currentTime + dur * 0.7);
  go.gain.setValueAtTime(vol, ac.currentTime);
  go.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur * 0.7);
  o.start(); o.stop(ac.currentTime + dur * 0.7);
}

function sndIntercept(ac) {
  // Same recipe as launch but slightly shorter/quieter
  const buf = ac.createBuffer(1, ac.sampleRate * 0.55, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(80, ac.currentTime);
  f.frequency.exponentialRampToValueAtTime(900, ac.currentTime + 0.4);
  const gn = ac.createGain();
  src.buffer = buf; src.connect(f); f.connect(gn); gn.connect(ac.destination);
  gn.gain.setValueAtTime(0.45, ac.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.55);
  src.start(); src.stop(ac.currentTime + 0.55);
  // Deep ignition thud
  const o = ac.createOscillator(), go = ac.createGain();
  o.connect(go); go.connect(ac.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(110, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(28, ac.currentTime + 0.4);
  go.gain.setValueAtTime(0.5, ac.currentTime);
  go.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
  o.start(); o.stop(ac.currentTime + 0.4);
}

function sndAALaunch(ac) {
  // Deep whoosh — low noise filtered upward
  const buf = ac.createBuffer(1, ac.sampleRate * 0.5, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(120, ac.currentTime);
  f.frequency.exponentialRampToValueAtTime(600, ac.currentTime + 0.35);
  const gn = ac.createGain();
  src.buffer = buf; src.connect(f); f.connect(gn); gn.connect(ac.destination);
  gn.gain.setValueAtTime(0.35, ac.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
  src.start(); src.stop(ac.currentTime + 0.5);
  // Low ignition thud
  const o = ac.createOscillator(), go = ac.createGain();
  o.connect(go); go.connect(ac.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(90, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(30, ac.currentTime + 0.2);
  go.gain.setValueAtTime(0.4, ac.currentTime);
  go.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
  o.start(); o.stop(ac.currentTime + 0.2);
}

function sndIncome(ac) {
  [523, 659, 784].forEach((freq, i) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sine'; o.frequency.value = freq;
    const t = ac.currentTime + i * 0.1;
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.start(t); o.stop(t + 0.2);
  });
}

// ─── Constants ───────────────────────────────────────────────────────────────
const GRAVITY            = 0.007;
const EXPL_RADIUS        = 38;
const NUKE_EXPL_RADIUS   = 110;
const INTERCEPT_SPD      = 2.7;
const INTERCEPT_R        = 16;
const FIRE_COOLDOWN      = 90; // ~1.5s per launcher
const AA_DELAY           = 90;
const AA_MAX_ACTIVE      = 8;
const AA_COOLDOWN        = 180; // min frames between shots per AA gun (~3s)
const DRONE_SPD          = 2.5;
const DRONE_EXPL_RADIUS  = 28;
const DRONE_CRUISE_ALT   = Math.round(H * 0.28);
const PLATFORM_W         = 28;
const PLATFORM_H         = 8;
const GROUND_Y           = Math.round(H * 0.72);
const DAY_LENGTH         = 10800;   // ~3 min at 60 fps
const INCOME_INTERVAL    = 3600;    // 60 seconds at 60 fps

// Costs (dollars)
const INITIAL_BUDGET   = 100;
const DAILY_INCOME     = 50;
const AA_COST          = 20;
const LAUNCHER_COST    = 20;
const NUKE_COST        = 200;
const AMMO_COST        = { launcher: 5, nuke: 50, aa: 5 };
const AMMO_PACK        = { launcher: 5, nuke: 1,  aa: 5  }; // shots per purchase (also given free on weapon buy)

const AI_FIRE_MIN      = 150;
const AI_FIRE_MAX      = 300;
const AI_BUY_INTERVAL  = 1800;  // buy a weapon every 30s

// ─── Helpers ─────────────────────────────────────────────────────────────────
function lerpColor(a, b, t) {
  const ha = parseInt(a.slice(1), 16), hb = parseInt(b.slice(1), 16);
  const r = ((ha>>16)&0xff) + (((hb>>16)&0xff) - ((ha>>16)&0xff)) * t;
  const g = ((ha>>8) &0xff) + (((hb>>8) &0xff) - ((ha>>8) &0xff)) * t;
  const bl= ( ha     &0xff) + (( hb     &0xff) - ( ha     &0xff)) * t;
  return `rgb(${r|0},${g|0},${bl|0})`;
}
function fmt(b) { return `$${b}`; }
function dayPhase() { return dayTimer / DAY_LENGTH; }

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
let mousePos = { x: -1, y: -1 };

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); if (state === 'gameover') initGame(); }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
function canvasPos(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }

// ─── Touch → Mouse forwarding ────────────────────────────────────────────────
function forwardTouch(mouseType, e) {
  const t = e.touches[0] || e.changedTouches[0];
  canvas.dispatchEvent(new MouseEvent(mouseType, { clientX: t.clientX, clientY: t.clientY, bubbles: true }));
}
canvas.addEventListener('touchstart', e => { e.preventDefault(); forwardTouch('mousedown', e); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); forwardTouch('mousemove', e); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); forwardTouch('mouseup',   e); }, { passive: false });

// ─── Drag (weapon placement) ──────────────────────────────────────────────────
let drag = null;
canvas.addEventListener('mousedown', e => {
  if (state === 'start') { audioCtx.resume(); state = 'playing'; return; }
  if (state === 'gameover') { initGame(); return; }
  if (state !== 'playing') return;
  const {x: mx, y: my} = canvasPos(e);
  const p = players[0];

  // Sliders for fire frequency
  for (const [key, rect] of [['launcher', launcherSliderRect()], ['nuke', nukeSliderRect()]]) {
    if (mx >= rect.x - 6 && mx <= rect.x + rect.w + 6 && my >= rect.y - 6 && my <= rect.y + rect.h + 6) {
      sliderDragging = key;
      const v = Math.max(0, Math.min(1, (mx - rect.x) / rect.w));
      if (key === 'launcher') launcherFireFreq = v; else nukeFireFreq = v;
      return;
    }
  }

  // Shop: weapon drag to place
  const sr = shopRect();
  if (my >= sr.y && my <= sr.y + sr.h && mx >= sr.x && mx <= sr.x + sr.w) {
    const weapRows = [
      { type: 'aa',       cost: AA_COST },
      { type: 'launcher', cost: LAUNCHER_COST },
      { type: 'nuke',     cost: NUKE_COST },
    ];
    weapRows.forEach((wt, i) => {
      const rowY = sr.y + 16 + i * SHOP_ROW_H;
      if (my >= rowY && my <= rowY + 44 && p.budget >= wt.cost)
        drag = { type: wt.type, x: mx, y: my };
    });
  }
});

canvas.addEventListener('mousemove', e => {
  const {x, y} = canvasPos(e);
  mousePos = {x, y};
  if (sliderDragging) {
    const sl = sliderDragging === 'nuke' ? nukeSliderRect() : launcherSliderRect();
    const v = Math.max(0, Math.min(1, (x - sl.x) / sl.w));
    if (sliderDragging === 'launcher') launcherFireFreq = v; else nukeFireFreq = v;
  }
  if (drag) { drag.x = x; drag.y = y; }
  let pointer = false;
  if (state === 'playing') {
    for (const sl of [launcherSliderRect(), nukeSliderRect()])
      if (x >= sl.x - 4 && x <= sl.x + sl.w + 4 && y >= sl.y - 4 && y <= sl.y + sl.h + 4) pointer = true;
    const sr = shopRect();
    if (x >= sr.x && x <= sr.x + sr.w && y >= sr.y && y <= sr.y + sr.h) pointer = true;
  }
  canvas.style.cursor = sliderDragging ? 'ew-resize' : pointer ? 'pointer' : drag ? 'grabbing' : 'default';
});

canvas.addEventListener('mouseup', e => {
  sliderDragging = false;
  if (!drag) return;
  const {x: mx, y: my} = canvasPos(e);
  const p    = players[0];
  const plat = p.platforms.find(pl =>
    Math.abs(mx - pl.x) <= PLATFORM_W && my >= GROUND_Y - 90 && my <= GROUND_Y + 20
  );
  if (plat && plat.type !== drag.type) {
    const costs = { aa: AA_COST, launcher: LAUNCHER_COST, nuke: NUKE_COST };
    const cost  = costs[drag.type];
    if (cost && p.budget >= cost) {
      plat.type = drag.type;
      plat.cooldown = 0;
      p.budget -= cost;
    }
  }
  drag = null;
});

// ─── Buildings ───────────────────────────────────────────────────────────────
function genBgBuildings(seed) {
  const rng = (n => () => { n = (n * 1664525 + 1013904223) & 0xffffffff; return (n >>> 0) / 0xffffffff; })(seed);
  const buildings = [];
  let rx = -110;
  while (rx < 110) {
    const w = 8 + rng() * 14, h = 55 + rng() * 85;
    buildings.push({ rx: rx + w / 2, w: Math.round(w), h: Math.round(h) });
    rx += w + 1 + rng() * 5;
  }
  return buildings;
}

function genBuildings(seed) {
  const rng = (n => () => { n = (n * 1664525 + 1013904223) & 0xffffffff; return (n >>> 0) / 0xffffffff; })(seed);
  const buildings = [];
  let rx = -80;
  while (rx < 80) {
    const w = 10 + rng() * 18, h = 14 + rng() * 48;
    buildings.push({ rx: rx + w / 2, w: Math.round(w), h: Math.round(h) });
    rx += w + 2 + rng() * 6;
  }
  return buildings;
}

// ─── Platforms ───────────────────────────────────────────────────────────────
function makePlatforms(cityX, pointRight) {
  const gap = 34;
  const clear = pointRight ? 132 : 95;
  // Left city: all platforms extend rightward; right city: all extend leftward
  const s = pointRight ? 1 : -1;
  const offsets = [
    s*clear, s*(clear+gap), s*(clear+2*gap), s*(clear+3*gap),
    s*(clear+4*gap), s*(clear+5*gap), s*(clear+6*gap), s*(clear+7*gap),
    s*(clear+8*gap), s*(clear+9*gap), s*(clear+10*gap)
  ];
  return offsets.map(off => ({
    x: Math.round(Math.max(20, Math.min(W - 20, cityX + off))),
    type: 'empty', pointRight, cooldown: 0
  }));
}

// ─── Players ─────────────────────────────────────────────────────────────────
let players;
function makeCity(cityX, color, name, seed, side) {
  return {
    cityX, hp: 100, color, name,
    buildings: genBuildings(seed),
    bgBuildings: genBgBuildings(seed + 1000),
    budget: INITIAL_BUDGET,
    ammo: { launcher: 0, nuke: 0, aa: 0 },
    platforms: makePlatforms(cityX, side === 0)
  };
}
function initPlayers() {
  players = [
    makeCity(Math.round(W * 0.10), '#4dd0e1', 'City 1', 42, 0),
    makeCity(Math.round(W * 0.90), '#ef5350', 'City 2', 99, 1)
  ];
}

// ─── Game state ───────────────────────────────────────────────────────────────
let state, winner;
let missiles = [], interceptors = [], pendingAA = [], explosions = [], smoke = [], fires = [];
let flashMsg = null;
let currentIncome = DAILY_INCOME;
let dayTimer = 0, dayCount = 1, aiFireTimer = 150, incomeTimer = 0, aiBuyTimer = AI_BUY_INTERVAL;
// Auto-fire sequencing (player)
let launcherFireFreq = 0.35;   // 0=slow .. 1=fast
let nukeFireFreq     = 0.15;
let launcherSeqIdx = 0, launcherFireTimer = 0;
let nukeSeqIdx = 0, nukeFireTimer = 0;
let sliderDragging = null; // null | 'launcher' | 'nuke'
function launcherInterval() { return Math.round(540 - launcherFireFreq * 480); } // 540..60 frames
function nukeInterval()     { return Math.round(540 - nukeFireFreq     * 480); }

function setFlash(t, c) { flashMsg = { text: t, color: c, ttl: 90 }; }

function aiDeployWeapon(type) {
  const ai = players[1];
  const empty = ai.platforms.filter(p => p.type === 'empty');
  if (!empty.length) return false;
  empty[Math.random() * empty.length | 0].type = type;
  return true;
}

function initGame() {
  initPlayers();
  missiles = []; interceptors = []; pendingAA = []; explosions = []; smoke = []; fires = [];
  flashMsg = null; drag = null; sliderDragging = false; currentIncome = DAILY_INCOME;
  dayTimer = 0; dayCount = 1; aiFireTimer = 150; incomeTimer = 0; aiBuyTimer = AI_BUY_INTERVAL;
  launcherSeqIdx = 0; launcherFireTimer = 0; nukeSeqIdx = 0; nukeFireTimer = 0;
  // Player starts with one AA deployed
  const p = players[0];
  const emptyP = p.platforms.filter(pl => pl.type === 'empty');
  if (emptyP.length) { emptyP[0].type = 'aa'; }
  p.ammo.aa       = AMMO_PACK.aa       * 10;
  p.ammo.launcher = AMMO_PACK.launcher * 10;
  p.ammo.nuke     = AMMO_PACK.nuke     * 5;
  // AI starts with one launcher and one AA deployed
  aiDeployWeapon('launcher');
  aiDeployWeapon('aa');
  state = 'playing'; winner = null;
}

// ─── Rects ───────────────────────────────────────────────────────────────────
function shopRect() { return { x: 2, y: Math.min(GROUND_Y + 48, H - 184), w: 200, h: 182 }; }
const SHOP_ROW_H = 52;
function launcherSliderRect() {
  const sr = shopRect();
  const rowY = sr.y + 16 + 1 * SHOP_ROW_H; // MISSILE is row index 1
  return { x: sr.x + 63, y: rowY + 36, w: sr.w - 70, h: 7 };
}
function nukeSliderRect() {
  const sr = shopRect();
  const rowY = sr.y + 16 + 2 * SHOP_ROW_H; // SCUD is row index 2
  return { x: sr.x + 63, y: rowY + 36, w: sr.w - 70, h: 7 };
}
function fireBtnRect(x)  { return { x: x - 16, y: GROUND_Y + 3, w: 32, h: 13 }; }

// ─── Ammo ────────────────────────────────────────────────────────────────────
function buyAmmo(type) {
  const p = players[0];
  if (p.budget < AMMO_COST[type]) return;
  p.budget -= AMMO_COST[type];
  p.ammo[type] += AMMO_PACK[type];
}

// ─── Firing ───────────────────────────────────────────────────────────────────
function queueInterceptors(fromPlayer) {
  const defIdx = 1 - fromPlayer;
  const guns = players[defIdx].platforms.filter(pl => pl.type === 'aa' && (pl.aaCooldown || 0) <= 0);
  if (!guns.length) return;
  guns.forEach(gun => {
    if (players[defIdx].ammo.aa <= 0) return;
    players[defIdx].ammo.aa--;
    gun.aaCooldown = AA_COOLDOWN;
    pendingAA.push({ countdown: AA_DELAY + (Math.random() * 60 | 0), fromX: gun.x, defIdx });
  });
}

function spawnMissile(x, y, vx, vy, isNuke, isDrone, fromPlayer) {
  missiles.push({ x, y, vx, vy, isNuke, isDrone: !!isDrone, fromPlayer: fromPlayer || 0, trail: [], dead: false });
  playSound(sndLaunch);
  queueInterceptors(fromPlayer || 0);
}

function fireLauncher(pl) {
  const isNuke = pl.type === 'nuke';
  if (pl.cooldown > 0) return;
  const ammoKey = isNuke ? 'nuke' : 'launcher';
  if (players[0].ammo[ammoKey] <= 0) return;
  const enemy = players[1];
  const dx = enemy.cityX - pl.x, dist = Math.abs(dx), dir = Math.sign(dx);
  const minDeg = isNuke ? 44 : 48, maxDeg = isNuke ? 54 : 58;
  const angleBase = (minDeg + Math.random() * (maxDeg - minDeg)) * Math.PI / 180;
  const spread = (Math.random() - 0.5) * (isNuke ? 5 : 3) * Math.PI / 180;
  const angle = Math.max(0.3, Math.min(1.1, angleBase + spread));
  const spd = Math.sqrt((GRAVITY * dist) / Math.max(0.01, Math.sin(2 * angle)));
  spawnMissile(pl.x, GROUND_Y - 5, dir * Math.cos(angle) * spd, -Math.sin(angle) * spd, isNuke, false, 0);
  players[0].ammo[ammoKey]--;
  pl.cooldown = FIRE_COOLDOWN;
}


function fireAIPlatforms() {
  const ai = players[1];
  const target = players[0];
  const launchers = ai.platforms.filter(p => (p.type === 'launcher' || p.type === 'nuke') && p.cooldown <= 0);
  if (!launchers.length) return;
  const ammoKey = launchers[0].type === 'nuke' ? 'nuke' : 'launcher';
  if (ai.ammo[ammoKey] <= 0) return;
  const pl = launchers[Math.random() * launchers.length | 0];
  const dx = target.cityX - pl.x, dist = Math.abs(dx), dir = Math.sign(dx);
  const minDeg = pl.type === 'nuke' ? 44 : 48, maxDeg = pl.type === 'nuke' ? 54 : 58;
  const angleBase = (minDeg + Math.random() * (maxDeg - minDeg)) * Math.PI / 180;
  const spread = (Math.random() - 0.5) * 3 * Math.PI / 180;
  const angle = Math.max(0.3, Math.min(1.1, angleBase + spread));
  const spd = Math.sqrt((GRAVITY * dist) / Math.max(0.01, Math.sin(2 * angle)));
  spawnMissile(pl.x, GROUND_Y - 5, dir * Math.cos(angle) * spd, -Math.sin(angle) * spd, pl.type === 'nuke', false, 1);
  ai.ammo[ammoKey]--;
  pl.cooldown = FIRE_COOLDOWN;
}

function launchInterceptor(fromX, defIdx) {
  // Only target missiles fired by the other side
  const targets = missiles.filter(m => m.fromPlayer === 1 - defIdx && !m.dead);
  if (!targets.length || interceptors.length >= AA_MAX_ACTIVE) return;
  const ay = GROUND_Y - 10;
  let target = targets[0], nearDist = Infinity;
  targets.forEach(m => { const d = Math.hypot(m.x - players[defIdx].cityX, m.y - GROUND_Y); if (d < nearDist) { nearDist = d; target = m; } });
  // Lead prediction — but clamp to above ground so we never aim downward
  const dist = Math.hypot(target.x - fromX, target.y - ay);
  const leadT = dist / INTERCEPT_SPD;
  const px = target.x + target.vx * leadT;
  const py = target.y + target.vy * leadT + 0.5 * GRAVITY * leadT * leadT;
  // If predicted point is underground, aim at missile's current position instead
  const aimX = py >= GROUND_Y ? target.x : px;
  const aimY = py >= GROUND_Y ? target.y : py;
  const dx = aimX - fromX, dy = aimY - ay, d = Math.sqrt(dx*dx + dy*dy) || 1;
  interceptors.push({ x: fromX, y: ay, vx: (dx/d)*INTERCEPT_SPD, vy: (dy/d)*INTERCEPT_SPD, trail: [], dead: false, defIdx });
  playSound(sndAALaunch);
}

// ─── Update ───────────────────────────────────────────────────────────────────
function hitsCity(p, m) {
  const alive = Math.ceil((p.hp / 100) * p.buildings.length);
  for (let i = 0; i < alive; i++) {
    const b = p.buildings[i], bx = p.cityX + b.rx, by = GROUND_Y - b.h;
    if (m.x >= bx - b.w/2 - 1 && m.x <= bx + b.w/2 + 1 && m.y >= by && m.y <= by + b.h) return true;
  }
  return false;
}

function applyDamage(x, y, isNuke, isDrone) {
  const r   = (isNuke ? NUKE_EXPL_RADIUS : isDrone ? DRONE_EXPL_RADIUS : EXPL_RADIUS) + 45;
  const dmg = isNuke ? 65 : isDrone ? 12 : 18;
  players.forEach(p => {
    const d = Math.hypot(p.cityX - x, GROUND_Y - y);
    if (d < r) p.hp = Math.max(0, p.hp - Math.round((1 - d / r) * dmg));
  });
}

function update() {
  if (state !== 'playing') return;

  if (flashMsg && --flashMsg.ttl <= 0) flashMsg = null;
  players.forEach(p => p.platforms.forEach(pl => {
    if (pl.cooldown > 0) pl.cooldown--;
    if (pl.aaCooldown > 0) pl.aaCooldown--;
  }));

  // Day / night cycle
  dayTimer++;
  if (dayTimer >= DAY_LENGTH) { dayTimer = 0; dayCount++; }

  // Income every 20 seconds
  incomeTimer++;
  if (incomeTimer >= INCOME_INTERVAL) {
    incomeTimer = 0;
    players[0].budget += currentIncome;
    players[1].budget += currentIncome;
    setFlash(`+${fmt(currentIncome)}`, '#ffb300');
    currentIncome = Math.round(currentIncome * 1.1);
    playSound(sndIncome);
  }

  // Auto-refill ammo for player when empty
  ['launcher', 'nuke', 'aa'].forEach(type => {
    if (players[0].ammo[type] <= 0) buyAmmo(type);
  });

  // Auto-fire player launchers (sequential)
  {
    const launchers = players[0].platforms.filter(pl => pl.type === 'launcher');
    if (launchers.length > 0) {
      if (--launcherFireTimer <= 0) {
        launcherFireTimer = launcherInterval();
        launcherSeqIdx = launcherSeqIdx % launchers.length;
        fireLauncher(launchers[launcherSeqIdx]);
        launcherSeqIdx++;
      }
    } else { launcherFireTimer = 0; launcherSeqIdx = 0; }
  }

  // Auto-fire player nukes (sequential, fixed rate)
  {
    const nukes = players[0].platforms.filter(pl => pl.type === 'nuke');
    if (nukes.length > 0) {
      if (--nukeFireTimer <= 0) {
        nukeFireTimer = nukeInterval();
        nukeSeqIdx = nukeSeqIdx % nukes.length;
        fireLauncher(nukes[nukeSeqIdx]);
        nukeSeqIdx++;
      }
    } else { nukeFireTimer = 0; nukeSeqIdx = 0; }
  }

  // AI update
  {
    const ai = players[1];
    // Fire missiles from deployed platforms
    if (--aiFireTimer <= 0) {
      fireAIPlatforms();
      aiFireTimer = AI_FIRE_MIN + Math.floor(Math.random() * (AI_FIRE_MAX - AI_FIRE_MIN));
    }
    // Buy ammo when exhausted
    if (ai.ammo.launcher <= 0 && ai.budget >= AMMO_COST.launcher) {
      ai.budget -= AMMO_COST.launcher; ai.ammo.launcher += AMMO_PACK.launcher;
    }
    if (ai.ammo.aa <= 0 && ai.budget >= AMMO_COST.aa) {
      ai.budget -= AMMO_COST.aa; ai.ammo.aa += AMMO_PACK.aa;
    }
    if (ai.ammo.nuke <= 0 && ai.platforms.some(p => p.type === 'nuke') && ai.budget >= AMMO_COST.nuke) {
      ai.budget -= AMMO_COST.nuke; ai.ammo.nuke += AMMO_PACK.nuke;
    }
    // Buy weapons at fixed pace, alternating launcher / aa
    if (--aiBuyTimer <= 0) {
      aiBuyTimer = AI_BUY_INTERVAL;
      const launcherCount = ai.platforms.filter(p => p.type === 'launcher').length;
      const aaCount = ai.platforms.filter(p => p.type === 'aa').length;
      const buyType = launcherCount <= aaCount ? 'launcher' : 'aa';
      const cost = buyType === 'aa' ? AA_COST : LAUNCHER_COST;
      if (ai.budget >= cost) { ai.budget -= cost; aiDeployWeapon(buyType); }
    }
  }

  // Missiles
  missiles.forEach(m => {
    if (m.dead) return;
    if (m.isDrone) {
      const enemy = players[1 - m.fromPlayer];
      const distToEnemy = Math.abs(m.x - enemy.cityX);
      const cruiseY = GROUND_Y - DRONE_CRUISE_ALT;
      if (distToEnemy > 60) { m.vy += (cruiseY - m.y) * 0.05; m.vy = Math.max(-3, Math.min(1.5, m.vy)); }
      else { m.vy += GRAVITY * 2.5; }
    } else { m.vy += GRAVITY; }
    m.x += m.vx; m.y += m.vy;
    if (m.x < 0 || m.x >= W || m.y > H + 20) { m.dead = true; return; }
    const explode = (hx, hy) => {
      applyDamage(hx, hy, m.isNuke, m.isDrone);
      const maxR = m.isNuke ? NUKE_EXPL_RADIUS : m.isDrone ? DRONE_EXPL_RADIUS : EXPL_RADIUS;
      explosions.push({ x: hx, y: hy, r: 2, maxR, alpha: 1, nuke: m.isNuke, age: 0, phase: 'expand' });
      spawnSmoke(hx, hy, m.isNuke ? 35 : 18);
      playSound(ac => sndExplosion(ac, m.isNuke));
      m.dead = true;
    };
    if (m.y >= GROUND_Y) { explode(m.x, m.y); return; }
    if (hitsCity(players[1 - m.fromPlayer], m)) { explode(m.x, m.y); }
  });
  missiles = missiles.filter(m => !m.dead);

  for (let i = pendingAA.length - 1; i >= 0; i--) {
    if (--pendingAA[i].countdown <= 0) {
      launchInterceptor(pendingAA[i].fromX, pendingAA[i].defIdx);
      pendingAA.splice(i, 1);
    }
  }

  interceptors.forEach(ic => {
    if (ic.dead) return;
    // Only chase missiles from the enemy side
    const enemyMissiles = missiles.filter(m => m.fromPlayer === 1 - ic.defIdx && !m.dead);
    let nearest = null, nearDist = Infinity;
    enemyMissiles.forEach(m => { const d = Math.hypot(m.x - ic.x, m.y - ic.y); if (d < nearDist) { nearDist = d; nearest = m; } });
    if (!nearest) { ic.dead = true; return; }
    const dx = nearest.x - ic.x, dy = nearest.y - ic.y, d = Math.sqrt(dx*dx + dy*dy) || 1;
    ic.vx += ((dx/d)*INTERCEPT_SPD - ic.vx) * 0.10;
    ic.vy += ((dy/d)*INTERCEPT_SPD - ic.vy) * 0.10;
    const cs = Math.sqrt(ic.vx**2 + ic.vy**2) || 1;
    ic.vx = (ic.vx/cs)*INTERCEPT_SPD; ic.vy = (ic.vy/cs)*INTERCEPT_SPD;
    ic.x += ic.vx; ic.y += ic.vy;
    if (nearDist < INTERCEPT_R) {
      explosions.push({ x: nearest.x, y: nearest.y, r: 2, maxR: 10, alpha: 1, nuke: false, age: 0, phase: 'expand' });
      nearest.dead = true; ic.dead = true;
      spawnSmoke(nearest.x, nearest.y, 10);
      playSound(sndIntercept);
    }
    if (ic.x < 0 || ic.x >= W || ic.y > H || ic.y >= GROUND_Y) ic.dead = true;
  });
  interceptors = interceptors.filter(ic => !ic.dead);
  missiles     = missiles.filter(m  => !m.dead);

  if (players[0].hp <= 0) { winner = 1; state = 'gameover'; return; }
  if (players[1].hp <= 0) { winner = 0; state = 'gameover'; return; }

  explosions.forEach(e => {
    e.age++;
    const expandFrames = e.nuke ? 22 : 12;
    const blinkFrames  = e.nuke ? 90 : 50;
    const fadeFrames   = e.nuke ? 80 : 40;
    if (e.phase === 'expand') {
      e.r += (e.maxR - e.r) * 0.18;
      if (e.age >= expandFrames) { e.phase = 'blink'; e.age = 0; e.r = e.maxR; }
    } else if (e.phase === 'blink') {
      e.alpha = 0.55 + 0.45 * Math.sin(e.age * 0.45);
      if (e.age >= blinkFrames) { e.phase = 'fade'; e.age = 0; }
    } else {
      e.alpha = 1 - e.age / fadeFrames;
    }
  });
  explosions = explosions.filter(e => e.alpha > 0);
  updateSmoke();
  updateFires();
}

// ─── Draw ────────────────────────────────────────────────────────────────────
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, '#1a1a1a'); g.addColorStop(1, '#2a2a2a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 90; i++) ctx.fillRect((i*173+41)%W, (i*101+13)%(GROUND_Y*0.76), 1, 1);

  // Moon
  const mx = W * 0.72, my = GROUND_Y * 0.18, mr = 13;
  ctx.save();
  ctx.shadowColor = 'rgba(235,230,200,0.8)';
  ctx.shadowBlur = 18;
  ctx.fillStyle = 'rgba(235,230,200,1)';
  ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawTerrain() {
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
}

function drawAAGunAt(cx, sy, color, right) {

  ctx.drawImage(imgInterceptor, -dw/2, -dh/2, dw, dh);
  ctx.restore();
}

function drawLauncherAt(cx, sy, color, right) {
  const iw = 76, ih = 48, scale = 0.45;
  const dw = iw * scale, dh = ih * scale;

  ctx.translate(cx, sy - dh/2);
  if (!right) { ctx.scale(-1, 1); }

}

function drawNukeLauncherAt(cx, sy, color, right) {
  const iw = 76, ih = 48, scale = 0.45;
  const dw = iw * scale, dh = ih * scale;
  ctx.save();
  ctx.translate(cx, sy - dh/2);
  if (!right) { ctx.scale(-1, 1); }

function drawFireBtn(x, type, cooling) {
  const br  = fireBtnRect(x);
  const ammo = players[0].ammo[type] || 0;
  const rdy = ammo > 0 && !cooling;
  const isNuke = type === 'nuke';
  const hot = rdy && mousePos.x >= br.x && mousePos.x <= br.x + br.w && mousePos.y >= br.y && mousePos.y <= br.y + br.h;
  ctx.fillStyle = !ammo ? '#222' : cooling ? '#333' : isNuke ? (hot ? '#6a1b9a' : '#4a148c') : (hot ? '#d32f2f' : '#b71c1c');
  ctx.fillRect(br.x, br.y, br.w, br.h);
  ctx.fillStyle = rdy ? '#fff' : '#444'; ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
  ctx.fillText(!ammo ? `NO AMMO` : cooling ? `WAIT` : `FIRE`, x, br.y + 10);
}

function drawPlatforms(p, isPlayer1) {
  p.platforms.forEach(pl => {
    const sy = GROUND_Y;
    if (pl.type === 'aa') {
      const hasAmmo = p.ammo.aa > 0;
      ctx.globalAlpha = hasAmmo ? 1 : 0.45;
      drawAAGunAt(pl.x, sy, '#111', pl.pointRight);
      ctx.globalAlpha = 1;
    } else if (pl.type === 'launcher') {
      const hasAmmo = p.ammo.launcher > 0;
      ctx.globalAlpha = hasAmmo ? 1 : 0.45;
      drawLauncherAt(pl.x, sy, '#111', pl.pointRight);
      ctx.globalAlpha = 1;
    } else if (pl.type === 'nuke') {
      const hasAmmo = p.ammo.nuke > 0;
      ctx.globalAlpha = hasAmmo ? 1 : 0.45;
      drawNukeLauncherAt(pl.x, sy, '#111', pl.pointRight);
      ctx.globalAlpha = 1;
    }
  });
}

function drawBgCity(p) {
  const WIN_COLORS = [
    'rgba(180,210,240,0.7)',   // blue-white (bg layer from city_v1)
    'rgba(220,190,120,0.5)',   // warm orange (bg layer from city_v1)
    'rgba(200,225,255,0.5)',   // cool white (bg layer from city_v1)
  ];
  p.bgBuildings.forEach((b, i) => {
    const bx = p.cityX + b.rx, by = GROUND_Y - b.h;
    ctx.fillStyle = '#161616'; ctx.fillRect(bx - b.w/2, by, b.w, b.h);
    ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 1; ctx.strokeRect(bx - b.w/2, by, b.w, b.h);
    const winColor = WIN_COLORS[i % 3];
    ctx.save();
    for (let wy = by+8; wy < by+b.h-5; wy += 6) {
      for (let wx = bx-b.w/2+4; wx < bx+b.w/2-4; wx += 5) {
        const hash = ((wx * 73856093) ^ (wy * 19349663)) >>> 0;
        const lit = (hash % 3) !== 0;
        if (lit) {
          ctx.shadowColor = winColor;
          ctx.shadowBlur = 3;
          ctx.fillStyle = winColor;
        } else {
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#252525';
        }
        ctx.fillRect(wx, wy, 2, 3);
      }
    }
    ctx.restore();
  });
}

function drawCity(p) {
  const alive = Math.ceil((p.hp / 100) * p.buildings.length);
  p.buildings.forEach((b, i) => {
    const bx = p.cityX + b.rx, by = GROUND_Y - b.h;
    if (i >= alive) { ctx.fillStyle = '#111'; ctx.fillRect(bx - b.w/2, GROUND_Y-4, b.w, 4); return; }
    ctx.fillStyle = '#111'; ctx.fillRect(bx - b.w/2, by, b.w, b.h);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.strokeRect(bx - b.w/2, by, b.w, b.h);
    const WIN_COLORS = [
      'rgba(240,165,40,1)',    // orange
      'rgba(235,235,210,1)',   // white/cream
      'rgba(255,220,80,1)',    // yellow
    ];
    const winColor = WIN_COLORS[i % 3];
    ctx.save();
    for (let wy = by+9; wy < by+b.h-6; wy += 8) {
      for (let wx = bx-b.w/2+6; wx < bx+b.w/2-6; wx += 6) {
        const hash = ((wx * 73856093) ^ (wy * 19349663)) >>> 0;
        const lit = (hash % 3) !== 0;
        if (lit) {
          ctx.shadowColor = winColor;
          ctx.shadowBlur = 6;
          ctx.fillStyle = winColor;
        } else {
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#2e2e2e';
        }
        ctx.fillRect(wx, wy, 3, 4);
      }
    }
    // Red rooftop warning light on some buildings
    if (i % 3 === 1 && b.h > 28) {
      const lx = bx + b.w / 2 - 2, ly = by - 1;
      const flicker = 0.7 + 0.3 * Math.sin(performance.now() / 600 + i);
      ctx.save();
      ctx.shadowColor = `rgba(220,40,40,${0.9 * flicker})`;
      ctx.shadowBlur = 7;
      ctx.fillStyle = `rgba(220,40,40,${flicker})`;
      ctx.beginPath(); ctx.arc(lx, ly, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  });
}

function spawnFire(x, y, isNuke) {
  const spread = isNuke ? 55 : 28;
  const count  = isNuke ? 12 : 6;
  for (let i = 0; i < count; i++) {
    fires.push({
      x: x + (Math.random() - 0.5) * spread,
      y: GROUND_Y,
      spread,
      life: 0.7 + Math.random() * 0.6,   // long life
      phase: Math.random() * Math.PI * 2  // flicker offset
    });
  }
}

function updateFires() {
  fires.forEach(f => { f.life -= 0.0008 + Math.random() * 0.0004; });
  fires = fires.filter(f => f.life > 0);
}

function drawFires() {
  const t = performance.now() / 1000;
  fires.forEach(f => {
    const flicker = 0.6 + 0.4 * Math.sin(t * 8 + f.phase);
    const h = (18 + f.spread * 0.6) * f.life * flicker;
    const r = (6 + f.spread * 0.25) * f.life * flicker;
    const a = Math.min(1, f.life * 1.5);
    // Outer orange
    const g1 = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y - h * 0.4, r);
    g1.addColorStop(0,   `rgba(255,200,50,${a * 0.9})`);
    g1.addColorStop(0.4, `rgba(255,80,0,${a * 0.7})`);
    g1.addColorStop(1,   `rgba(180,20,0,0)`);
    ctx.beginPath(); ctx.arc(f.x, f.y - h * 0.3, r, 0, Math.PI * 2);
    ctx.fillStyle = g1; ctx.fill();
    // Inner bright core
    const g2 = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r * 0.4);
    g2.addColorStop(0, `rgba(255,255,200,${a})`);
    g2.addColorStop(1, `rgba(255,150,0,0)`);
    ctx.beginPath(); ctx.arc(f.x, f.y, r * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = g2; ctx.fill();
  });
}

function spawnSmoke(x, y, count) {
  for (let i = 0; i < count; i++) {
    smoke.push({
      x: x + (Math.random() - 0.5) * 20,
      y: y + (Math.random() - 0.5) * 10,
      vx: (Math.random() - 0.5) * 0.12,
      vy: -(0.03 + Math.random() * 0.07),
      r: 6 + Math.random() * 10,
      alpha: 0.18 + Math.random() * 0.12,
      life: 1.0,
      decay: 0.0006 + Math.random() * 0.0004
    });
  }
}

function updateSmoke() {
  smoke.forEach(s => {
    s.x += s.vx; s.y += s.vy;
    s.r += 0.04;
    s.life -= s.decay;
    s.alpha = s.life * 0.22;
  });
  smoke = smoke.filter(s => s.life > 0);
}

function drawSmoke() {
  smoke.forEach(s => {
    const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r);
    g.addColorStop(0,   `rgba(90,90,90,${s.alpha})`);
    g.addColorStop(0.5, `rgba(60,60,60,${s.alpha * 0.5})`);
    g.addColorStop(1,   `rgba(40,40,40,0)`);
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = g; ctx.fill();
  });
}

function drawFireball(x, y, r, inner, outer) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0,   `rgba(255,255,200,1)`);
  g.addColorStop(0.25, inner);
  g.addColorStop(0.7,  outer);
  g.addColorStop(1,   `rgba(0,0,0,0)`);
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill();
}

function drawMissiles() {
  missiles.forEach(m => {
    const r = m.isNuke ? 10 : 6;
    drawFireball(m.x, m.y, r, `rgba(255,120,0,1)`, `rgba(180,40,0,0)`);
  });
}

function drawInterceptors() {
  interceptors.forEach(ic => {
    drawFireball(ic.x, ic.y, 4, `rgba(255,120,0,1)`, `rgba(180,40,0,0)`);
  });
}

function drawExplosions() {
  explosions.forEach(({ x, y, r, alpha, nuke, phase }) => {
    const a = Math.max(0, Math.min(1, alpha));
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0,   `rgba(255,255,200,${a})`);
    g.addColorStop(0.3, `rgba(255,160,0,${a})`);
    g.addColorStop(0.7, `rgba(200,40,0,${a*0.8})`);
    g.addColorStop(1,   `rgba(80,10,0,0)`);
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill();

  });
}

      // Frequency slider for launcher (i=1) and scud (i=2)
      const sl   = i === 1 ? launcherSliderRect() : nukeSliderRect();
      const freq = i === 1 ? launcherFireFreq : nukeFireFreq;
      const key  = i === 1 ? 'launcher' : 'nuke';
      ctx.fillStyle = '#2a2a2a'; ctx.fillRect(sl.x, sl.y, sl.w, sl.h);
      ctx.fillStyle = '#fff'; ctx.fillRect(sl.x, sl.y, sl.w * freq, sl.h);
      const tx = sl.x + sl.w * freq;
      ctx.beginPath(); ctx.arc(tx, sl.y + sl.h / 2, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff'; ctx.fill();
    }
  });
}

function drawDrag() {
  if (!drag) return;
  ctx.globalAlpha = 0.82;
  if (drag.type === 'aa')       drawAAGunAt(drag.x, drag.y, players[0].color);
  else if (drag.type === 'launcher') drawLauncherAt(drag.x, drag.y, players[0].color, true);
  else                          drawNukeLauncherAt(drag.x, drag.y, players[0].color, true);
  ctx.globalAlpha = 1;
  players[0].platforms.filter(pl => pl.type !== drag.type).forEach(pl => {
    ctx.save(); ctx.strokeStyle='rgba(255,255,100,0.5)'; ctx.lineWidth=1.5; ctx.setLineDash([3,3]);
    ctx.strokeRect(pl.x - PLATFORM_W/2, GROUND_Y - 32, PLATFORM_W, 32);
    ctx.setLineDash([]); ctx.restore();
  });
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.60)'; ctx.fillRect(0, 0, W, 48);

  // HP bars at top
  const bw = 200, bh = 10, margin = 12, barY = 10;
  players.forEach((p, i) => {
    const ratio = p.hp / 100;
    const barX = i === 0 ? margin : W - margin - bw;
    ctx.fillStyle = '#111'; ctx.fillRect(barX, barY, bw, bh);
    ctx.fillStyle = ratio > 0.5 ? '#4caf50' : ratio > 0.25 ? '#ff9800' : '#f44336';
    ctx.fillRect(barX, barY, bw * ratio, bh);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, bw, bh);
    ctx.font = 'bold 11px monospace'; ctx.fillStyle = '#ccc';
    ctx.textAlign = i === 0 ? 'left' : 'right';
    ctx.fillText(`${p.name}  ${p.hp}%`, i === 0 ? barX : barX + bw, barY + bh + 13);
  });

  // Budget
  ctx.textAlign = 'left'; ctx.font = 'bold 22px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(fmt(players[0].budget), W/2 - 40, 30);

  if (flashMsg) {
    ctx.textAlign = 'left'; ctx.font = 'bold 14px monospace'; ctx.fillStyle = flashMsg.color;
    ctx.globalAlpha = Math.min(1, flashMsg.ttl / 25); ctx.fillText(flashMsg.text, W/2 - 40, 48); ctx.globalAlpha = 1;
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0, 0, W, H);
  const p = players[winner];
  ctx.textAlign = 'center'; ctx.font = 'bold 48px monospace'; ctx.fillStyle = p.color;
  ctx.fillText(`${p.name} WINS`, W/2, H/2 - 16);
  ctx.font = '16px monospace'; ctx.fillStyle = '#999';
  ctx.fillText('Tap or press SPACE to play again', W/2, H/2 + 30);
}

function drawStartScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 52px monospace'; ctx.fillStyle = '#e0e0e0';
  ctx.fillText('CITY SIEGE', W/2, H/2 - 30);
  ctx.font = '20px monospace'; ctx.fillStyle = '#888';
  ctx.fillText('Click to start', W/2, H/2 + 30);
}

// ─── Loop ────────────────────────────────────────────────────────────────────
function loop() {
  if (state !== 'start') update();
  drawSky(); drawTerrain();
  drawPlatforms(players[0], true);
  drawPlatforms(players[1], false);
  players.forEach(drawBgCity);
  players.forEach(drawCity);
  drawSmoke(); drawFires(); drawMissiles(); drawInterceptors(); drawExplosions();
  if (state === 'start') {
    drawStartScreen();
  } else if (state !== 'gameover') {
    drawHUD();
    if (state === 'playing') { drawShop(); drawDrag(); }
  } else {
    drawGameOver();
  }
  requestAnimationFrame(loop);
}

initGame();
state = 'start';
loop();
</script>
</body>
</html>
