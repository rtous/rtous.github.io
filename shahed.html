<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>SHAHED</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden;
        touch-action: none; -webkit-tap-highlight-color: transparent;
        user-select: none; -webkit-user-select: none; }
    html, body { width: 100%; height: 100%; background: #0a0a0a; font-family: monospace; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W, H, GROUND_Y, DRONE_CRUISE_ALT;

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const CONFIG = {
  gravity:             0.007,
  groundYRatio:        0.54,       // higher than desktop to leave room for shop below
  droneCruiseAltRatio: 0.28,
  interceptSpeed:      2.7,
  interceptRadius:     16,
  fireCooldown:        90,
  aaDelay:             90,
  aaMaxActive:         8,
  aaCooldown:          180,
  platformW:           28,
  platformH:           8,
  dayLength:           10800,
  incomeInterval:      3600,
  initialBudget:       100,
  dailyIncome:         50,
  aiFireMin:           150,
  aiFireMax:           300,
  aiBuyInterval:       1800,
};
function updateDimensions() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  GROUND_Y         = Math.round(H * CONFIG.groundYRatio);
  DRONE_CRUISE_ALT = Math.round(H * CONFIG.droneCruiseAltRatio);
}
updateDimensions();

// ─── WEAPONS ─────────────────────────────────────────────────────────────────
const WEAPONS = {
  aa:        { cost: 20,  ammoCost: 5,   ammoPack: 5, label: 'PATRIOT',  defensive: true,  image: 'interceptor', imageW: 73, imageH: 47, imageScale: 0.45, initialAmmoPacks: 10, alwaysBuyAmmo: true },
  launcher:  { cost: 20,  ammoCost: 5,   ammoPack: 5, label: 'SAM2',     explRadius: 38,  damage: 18, image: 'launcher',    imageW: 76, imageH: 48, imageScale: 0.45, weaponCooldown: 90,  defaultFireFreq: 0, fireIntervalMin: 60,  fireIntervalMax: 540, initialAmmoPacks: 10, alwaysBuyAmmo: true },
  nuke:      { cost: 200, ammoCost: 50,  ammoPack: 1, label: 'SCUD',     explRadius: 110, damage: 65, image: 'nukeLauncher', imageW: 76, imageH: 48, imageScale: 0.45, weaponCooldown: 90,  defaultFireFreq: 0, fireIntervalMin: 60,  fireIntervalMax: 540, initialAmmoPacks: 5,  isNuke: true },
  artillery: { cost: 30,  ammoCost: 8,   ammoPack: 4, label: 'ARTILLERY', explRadius: 55,  damage: 26, image: 'artillery',   imageW: 76, imageH: 48, imageScale: 0.45, weaponCooldown: 150, defaultFireFreq: 0, fireIntervalMin: 60,  fireIntervalMax: 540, initialAmmoPacks: 5 },
  humvee:    { cost: 15,  ammoCost: 5,   ammoPack: 5, label: 'HUMVEE',   explRadius: 28,  damage: 12, image: 'humvee',      imageW: 76, imageH: 48, imageScale: 0.45, weaponCooldown: 90,  defaultFireFreq: 0, fireIntervalMin: 40,  fireIntervalMax: 200, initialAmmoPacks: 5,  isDrone: true },
  nuke2:     { cost: 350, ammoCost: 100, ammoPack: 1, label: 'NUKE',     explRadius: 150, damage: 80, image: 'nuke2',       imageW: 76, imageH: 48, imageScale: 0.45, weaponCooldown: 90,  defaultFireFreq: 0, fireIntervalMin: 60,  fireIntervalMax: 540, initialAmmoPacks: 3,  isNuke: true },
};
const WEAPON_TYPES    = Object.keys(WEAPONS);
const OFFENSIVE_TYPES = WEAPON_TYPES.filter(k => !WEAPONS[k].defensive);

// ─── CITIES config ───────────────────────────────────────────────────────────
const CITIES = [
  { xRatio: 0.10, color: '#4dd0e1', name: 'City 1', seed: 42, side: 0 },
  { xRatio: 0.90, color: '#ef5350', name: 'City 2', seed: 99, side: 1 },
];

// ─── SHOP layout config ──────────────────────────────────────────────────────
const SHOP_COLS     = [['aa', 'launcher', 'nuke'], ['artillery', 'humvee', 'nuke2']];
const SHOP_ROW_H    = 44;   // smaller than desktop (52) to fit landscape phone height
const SHOP_COL_W    = 170;
const SHOP_COL_GAP  = 2;
const SHOP_Y_OFFSET = 6;

// ─── Images ──────────────────────────────────────────────────────────────────
const IMAGE_SRCS = {
  interceptor:  'interceptor.png',
  launcher:     'launcher1.png',
  nukeLauncher: 'launcher3.png',
  artillery:    'launcher4.png',
  humvee:       'launcher5.png',
  nuke2:        'launcher6.png',
};
const images = {};
Object.entries(IMAGE_SRCS).forEach(([k, src]) => { images[k] = new Image(); images[k].src = src; });

// ─── Audio ────────────────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(fn) { try { fn(audioCtx); } catch(e) {} }

function sndLaunch(ac) {
  const buf = ac.createBuffer(1, ac.sampleRate * 0.7, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(80, ac.currentTime);
  f.frequency.exponentialRampToValueAtTime(900, ac.currentTime + 0.5);
  const gn = ac.createGain();
  src.buffer = buf; src.connect(f); f.connect(gn); gn.connect(ac.destination);
  gn.gain.setValueAtTime(0.6, ac.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.7);
  src.start(); src.stop(ac.currentTime + 0.7);
  const o = ac.createOscillator(), go = ac.createGain();
  o.connect(go); go.connect(ac.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(110, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(28, ac.currentTime + 0.5);
  go.gain.setValueAtTime(0.65, ac.currentTime);
  go.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
  o.start(); o.stop(ac.currentTime + 0.5);
}

function sndExplosion(ac, isNuke) {
  const vol = isNuke ? 1.2 : 1.0, dur = isNuke ? 1.4 : 0.7;
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(80, ac.currentTime);
  f.frequency.exponentialRampToValueAtTime(900, ac.currentTime + dur * 0.7);
  const gn = ac.createGain();
  src.buffer = buf; src.connect(f); f.connect(gn); gn.connect(ac.destination);
  gn.gain.setValueAtTime(vol * 0.9, ac.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.start(); src.stop(ac.currentTime + dur);
  const o = ac.createOscillator(), go = ac.createGain();
  o.connect(go); go.connect(ac.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(110, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(28, ac.currentTime + dur * 0.7);
  go.gain.setValueAtTime(vol, ac.currentTime);
  go.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur * 0.7);
  o.start(); o.stop(ac.currentTime + dur * 0.7);
}

function sndIntercept(ac) {
  const buf = ac.createBuffer(1, ac.sampleRate * 0.55, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(80, ac.currentTime);
  f.frequency.exponentialRampToValueAtTime(900, ac.currentTime + 0.4);
  const gn = ac.createGain();
  src.buffer = buf; src.connect(f); f.connect(gn); gn.connect(ac.destination);
  gn.gain.setValueAtTime(0.45, ac.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.55);
  src.start(); src.stop(ac.currentTime + 0.55);
  const o = ac.createOscillator(), go = ac.createGain();
  o.connect(go); go.connect(ac.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(110, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(28, ac.currentTime + 0.4);
  go.gain.setValueAtTime(0.5, ac.currentTime);
  go.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
  o.start(); o.stop(ac.currentTime + 0.4);
}

function sndAALaunch(ac) {
  const buf = ac.createBuffer(1, ac.sampleRate * 0.5, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = ac.createBufferSource();
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(120, ac.currentTime);
  f.frequency.exponentialRampToValueAtTime(600, ac.currentTime + 0.35);
  const gn = ac.createGain();
  src.buffer = buf; src.connect(f); f.connect(gn); gn.connect(ac.destination);
  gn.gain.setValueAtTime(0.35, ac.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
  src.start(); src.stop(ac.currentTime + 0.5);
  const o = ac.createOscillator(), go = ac.createGain();
  o.connect(go); go.connect(ac.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(90, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(30, ac.currentTime + 0.2);
  go.gain.setValueAtTime(0.4, ac.currentTime);
  go.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
  o.start(); o.stop(ac.currentTime + 0.2);
}

function sndIncome(ac) {
  [523, 659, 784].forEach((freq, i) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sine'; o.frequency.value = freq;
    const t = ac.currentTime + i * 0.1;
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.start(t); o.stop(t + 0.2);
  });
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmt(b) { return `$${b}`; }
function dayPhase() { return dayTimer / CONFIG.dayLength; }
function makeRng(seed) {
  let n = seed;
  return () => { n = (n * 1664525 + 1013904223) & 0xffffffff; return (n >>> 0) / 0xffffffff; };
}

// ─── Layout helpers ───────────────────────────────────────────────────────────
function shopRect(col) {
  return {
    x: SHOP_COL_GAP + col * (SHOP_COL_W + SHOP_COL_GAP),
    y: GROUND_Y + SHOP_Y_OFFSET,
    w: SHOP_COL_W,
    h: SHOP_ROW_H * SHOP_COLS[col].length + 20,
  };
}
function sliderRect(type) {
  for (let col = 0; col < SHOP_COLS.length; col++) {
    const row = SHOP_COLS[col].indexOf(type);
    if (row < 0) continue;
    const sr = shopRect(col);
    return { x: sr.x + 50, y: sr.y + 14 + row * SHOP_ROW_H + 30, w: sr.w - 57, h: 6 };
  }
  return null;
}

// ─── Fullscreen ───────────────────────────────────────────────────────────────
function requestFullscreen() {
  const el = document.documentElement;
  try {
    if      (el.requestFullscreen)       el.requestFullscreen().catch(() => {});
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
    else if (el.msRequestFullscreen)     el.msRequestFullscreen();
  } catch(e) {}
  try {
    if (screen.orientation && screen.orientation.lock)
      screen.orientation.lock('landscape').catch(() => {});
  } catch(e) {}
}

// Only recalculate geometry on resize — never reset game state
window.addEventListener('resize', updateDimensions);
document.addEventListener('fullscreenchange', updateDimensions);
document.addEventListener('webkitfullscreenchange', updateDimensions);

// ─── Input ───────────────────────────────────────────────────────────────────
let mousePos = { x: -1, y: -1 };
let drag = null;
let sliderDragging = null;

function canvasXY(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) * (W / r.width),
    y: (clientY - r.top)  * (H / r.height),
  };
}

function playBtnRect() {
  const bw = 180, bh = 48;
  return { x: W / 2 - bw / 2, y: H / 2 + 22, w: bw, h: bh };
}

function handlePointerDown(mx, my) {
  if (state === 'start') {
    const btn = playBtnRect();
    if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
      audioCtx.resume();
      requestFullscreen();
      state = 'playing';
    }
    return;
  }
  if (state === 'gameover') { initGame(); return; }
  if (state !== 'playing') return;
  const p = players[0];

  // Sliders — bigger hit area for fingers
  for (const type of OFFENSIVE_TYPES) {
    const rect = sliderRect(type);
    if (!rect) continue;
    const deployed = p.platforms.some(pl => pl.type === type);
    if (deployed && mx >= rect.x - 10 && mx <= rect.x + rect.w + 10 && my >= rect.y - 10 && my <= rect.y + rect.h + 10) {
      sliderDragging = type;
      fireState[type].freq = Math.max(0, Math.min(1, (mx - rect.x) / rect.w));
      return;
    }
  }

  // Shop drag-to-place
  for (let col = 0; col < SHOP_COLS.length; col++) {
    const sr = shopRect(col);
    if (my < sr.y || my > sr.y + sr.h || mx < sr.x || mx > sr.x + sr.w) continue;
    SHOP_COLS[col].forEach((type, i) => {
      const rowY = sr.y + 14 + i * SHOP_ROW_H;
      if (my >= rowY && my <= rowY + SHOP_ROW_H - 2 && p.budget >= WEAPONS[type].cost)
        drag = { type, x: mx, y: my };
    });
  }
}

function handlePointerMove(x, y) {
  mousePos = { x, y };
  if (sliderDragging) {
    const sl = sliderRect(sliderDragging);
    if (sl) fireState[sliderDragging].freq = Math.max(0, Math.min(1, (x - sl.x) / sl.w));
  }
  if (drag) { drag.x = x; drag.y = y; }
}

function handlePointerUp(mx, my) {
  sliderDragging = null;
  if (!drag) return;
  const p = players[0];
  // Snap to nearest platform within a generous distance
  let nearest = null, nearDist = W / 5;
  p.platforms.forEach(pl => {
    const d = Math.hypot(mx - pl.x, my - GROUND_Y);
    if (d < nearDist) { nearDist = d; nearest = pl; }
  });
  if (nearest && nearest.type !== drag.type) {
    const w = WEAPONS[drag.type];
    if (w && p.budget >= w.cost) {
      nearest.type = drag.type;
      nearest.cooldown = w.weaponCooldown || CONFIG.fireCooldown;
      p.budget -= w.cost;
    }
  }
  drag = null;
}

// Touch events
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const pos = canvasXY(t.clientX, t.clientY);
  handlePointerDown(pos.x, pos.y);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const pos = canvasXY(t.clientX, t.clientY);
  handlePointerMove(pos.x, pos.y);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const pos = canvasXY(t.clientX, t.clientY);
  handlePointerUp(pos.x, pos.y);
}, { passive: false });

// Keyboard fallback (for desktop testing)
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); if (state === 'gameover') initGame(); }
});

// ─── Buildings ────────────────────────────────────────────────────────────────
function genBgBuildings(seed) {
  const rng = makeRng(seed), buildings = [];
  let rx = -110;
  while (rx < 110) {
    const w = 8 + rng() * 14, h = 55 + rng() * 85;
    buildings.push({ rx: rx + w / 2, w: Math.round(w), h: Math.round(h) });
    rx += w + 1 + rng() * 5;
  }
  return buildings;
}

function genBuildings(seed) {
  const rng = makeRng(seed), buildings = [];
  let rx = -80;
  while (rx < 80) {
    const w = 10 + rng() * 18, h = 14 + rng() * 48;
    buildings.push({ rx: rx + w / 2, w: Math.round(w), h: Math.round(h) });
    rx += w + 2 + rng() * 6;
  }
  return buildings;
}

// ─── Platforms ────────────────────────────────────────────────────────────────
function makePlatforms(cityX, pointRight) {
  const gap = 26, clear = pointRight ? 100 : 68, s = pointRight ? 1 : -1;
  return Array.from({ length: 8 }, (_, idx) => ({
    x: Math.round(Math.max(20, Math.min(W - 20, cityX + s * (clear + idx * gap)))),
    type: 'empty', pointRight, cooldown: 0,
  }));
}

// ─── Players ─────────────────────────────────────────────────────────────────
let players;
function makeCity(cfg) {
  const cityX = Math.round(W * cfg.xRatio);
  return {
    cityX, hp: 100, color: cfg.color, name: cfg.name,
    buildings:   genBuildings(cfg.seed),
    bgBuildings: genBgBuildings(cfg.seed + 1000),
    budget: CONFIG.initialBudget,
    ammo: Object.fromEntries(WEAPON_TYPES.map(t => [t, 0])),
    platforms: makePlatforms(cityX, cfg.side === 0),
  };
}
function initPlayers() { players = CITIES.map(makeCity); }

// ─── Game state ───────────────────────────────────────────────────────────────
let state, winner;
let missiles = [], interceptors = [], pendingAA = [], explosions = [], smoke = [], fires = [];
let flashMsg = null;
let currentIncome = CONFIG.dailyIncome;
let dayTimer = 0, dayCount = 1, aiFireTimer = 150, incomeTimer = 0, aiBuyTimer = CONFIG.aiBuyInterval;

let fireState = {};
function initFireState() {
  OFFENSIVE_TYPES.forEach(type => {
    fireState[type] = { freq: WEAPONS[type].defaultFireFreq, seqIdx: 0, timer: 0 };
  });
}
function fireInterval(type) {
  const { fireIntervalMin: mn, fireIntervalMax: mx } = WEAPONS[type];
  return Math.round(mx - fireState[type].freq * (mx - mn));
}

function setFlash(t, c) { flashMsg = { text: t, color: c, ttl: 90 }; }

function aiDeployWeapon(type) {
  const ai = players[1];
  const empty = ai.platforms.filter(p => p.type === 'empty');
  if (!empty.length) return false;
  empty[Math.random() * empty.length | 0].type = type;
  return true;
}

function initGame() {
  initPlayers();
  missiles = []; interceptors = []; pendingAA = []; explosions = []; smoke = []; fires = [];
  flashMsg = null; drag = null; sliderDragging = null; currentIncome = CONFIG.dailyIncome;
  dayTimer = 0; dayCount = 1; aiFireTimer = 150; incomeTimer = 0; aiBuyTimer = CONFIG.aiBuyInterval;
  initFireState();
  const p = players[0];
  const emptyP = p.platforms.filter(pl => pl.type === 'empty');
  if (emptyP.length) emptyP[0].type = 'aa';
  WEAPON_TYPES.forEach(type => {
    p.ammo[type] = WEAPONS[type].ammoPack * (WEAPONS[type].initialAmmoPacks || 0);
  });
  aiDeployWeapon('launcher');
  aiDeployWeapon('aa');
  state = 'playing'; winner = null;
}

// ─── Ammo ─────────────────────────────────────────────────────────────────────
function buyAmmo(type, player) {
  const w = WEAPONS[type];
  if (player.budget < w.ammoCost) return;
  player.budget -= w.ammoCost;
  player.ammo[type] += w.ammoPack;
}

// ─── Firing ───────────────────────────────────────────────────────────────────
function queueInterceptors(fromPlayer) {
  const defIdx = 1 - fromPlayer;
  const guns = players[defIdx].platforms.filter(pl => pl.type === 'aa' && (pl.aaCooldown || 0) <= 0);
  guns.forEach(gun => {
    if (players[defIdx].ammo.aa <= 0) return;
    players[defIdx].ammo.aa--;
    gun.aaCooldown = CONFIG.aaCooldown;
    pendingAA.push({ countdown: CONFIG.aaDelay + (Math.random() * 60 | 0), fromX: gun.x, defIdx });
  });
}

function spawnMissile(x, y, vx, vy, missileType, fromPlayer) {
  const w = WEAPONS[missileType] || {};
  missiles.push({ x, y, vx, vy, isNuke: !!w.isNuke, isDrone: !!w.isDrone, fromPlayer, trail: [], dead: false, missileType });
  playSound(sndLaunch);
  queueInterceptors(fromPlayer);
}

function fireLauncher(pl, playerIdx) {
  const type = pl.type, w = WEAPONS[type];
  if (pl.cooldown > 0 || players[playerIdx].ammo[type] <= 0) return;
  const enemy = players[1 - playerIdx];
  const dx = enemy.cityX - pl.x, dist = Math.abs(dx), dir = Math.sign(dx);
  const isNuke = !!w.isNuke;
  const minDeg = isNuke ? 44 : 48, maxDeg = isNuke ? 54 : 58;
  const angleBase = (minDeg + Math.random() * (maxDeg - minDeg)) * Math.PI / 180;
  const spread = (Math.random() - 0.5) * (isNuke ? 5 : 3) * Math.PI / 180;
  const angle = Math.max(0.3, Math.min(1.1, angleBase + spread));
  const spd = Math.sqrt((CONFIG.gravity * dist) / Math.max(0.01, Math.sin(2 * angle)));
  spawnMissile(pl.x, GROUND_Y - 5, dir * Math.cos(angle) * spd, -Math.sin(angle) * spd, type, playerIdx);
  players[playerIdx].ammo[type]--;
  pl.cooldown = w.weaponCooldown || CONFIG.fireCooldown;
}

function launchInterceptor(fromX, defIdx) {
  const targets = missiles.filter(m => m.fromPlayer === 1 - defIdx && !m.dead);
  if (!targets.length || interceptors.length >= CONFIG.aaMaxActive) return;
  const ay = GROUND_Y - 10;
  let target = targets[0], nearDist = Infinity;
  targets.forEach(m => { const d = Math.hypot(m.x - players[defIdx].cityX, m.y - GROUND_Y); if (d < nearDist) { nearDist = d; target = m; } });
  const dist = Math.hypot(target.x - fromX, target.y - ay);
  const leadT = dist / CONFIG.interceptSpeed;
  const px = target.x + target.vx * leadT;
  const py = target.y + target.vy * leadT + 0.5 * CONFIG.gravity * leadT * leadT;
  const aimX = py >= GROUND_Y ? target.x : px;
  const aimY = py >= GROUND_Y ? target.y : py;
  const dx = aimX - fromX, dy = aimY - ay, d = Math.sqrt(dx*dx + dy*dy) || 1;
  interceptors.push({ x: fromX, y: ay, vx: (dx/d)*CONFIG.interceptSpeed, vy: (dy/d)*CONFIG.interceptSpeed, trail: [], dead: false, defIdx });
  playSound(sndAALaunch);
}

// ─── Update ───────────────────────────────────────────────────────────────────
function hitsCity(p, m) {
  const alive = Math.ceil((p.hp / 100) * p.buildings.length);
  for (let i = 0; i < alive; i++) {
    const b = p.buildings[i], bx = p.cityX + b.rx, by = GROUND_Y - b.h;
    if (m.x >= bx - b.w/2 - 1 && m.x <= bx + b.w/2 + 1 && m.y >= by && m.y <= by + b.h) return true;
  }
  return false;
}

function applyDamage(x, y, missileType) {
  const w = WEAPONS[missileType] || WEAPONS.launcher;
  const r = w.explRadius + 45;
  players.forEach(p => {
    const d = Math.hypot(p.cityX - x, GROUND_Y - y);
    if (d < r) p.hp = Math.max(0, p.hp - Math.round((1 - d / r) * w.damage));
  });
}

function update() {
  if (state !== 'playing') return;
  if (flashMsg && --flashMsg.ttl <= 0) flashMsg = null;
  players.forEach(p => p.platforms.forEach(pl => {
    if (pl.cooldown > 0) pl.cooldown--;
    if (pl.aaCooldown > 0) pl.aaCooldown--;
  }));
  dayTimer++;
  if (dayTimer >= CONFIG.dayLength) { dayTimer = 0; dayCount++; }
  incomeTimer++;
  if (incomeTimer >= CONFIG.incomeInterval) {
    incomeTimer = 0;
    players[0].budget += currentIncome; players[1].budget += currentIncome;
    setFlash(`+${fmt(currentIncome)}`, '#ffb300');
    currentIncome = Math.round(currentIncome * 1.1);
    playSound(sndIncome);
  }
  WEAPON_TYPES.forEach(type => { if (players[0].ammo[type] <= 0) buyAmmo(type, players[0]); });
  OFFENSIVE_TYPES.forEach(type => {
    const plats = players[0].platforms.filter(pl => pl.type === type);
    const fs = fireState[type];
    if (plats.length > 0) {
      if (--fs.timer <= 0) {
        fs.timer = fireInterval(type);
        fs.seqIdx = fs.seqIdx % plats.length;
        fireLauncher(plats[fs.seqIdx], 0);
        fs.seqIdx++;
      }
    } else { fs.timer = 0; fs.seqIdx = 0; }
  });
  {
    const ai = players[1];
    if (--aiFireTimer <= 0) {
      const ready = ai.platforms.filter(pl => OFFENSIVE_TYPES.includes(pl.type) && pl.cooldown <= 0);
      if (ready.length) { const pl = ready[Math.random() * ready.length | 0]; if (ai.ammo[pl.type] > 0) fireLauncher(pl, 1); }
      aiFireTimer = CONFIG.aiFireMin + Math.floor(Math.random() * (CONFIG.aiFireMax - CONFIG.aiFireMin));
    }
    WEAPON_TYPES.forEach(type => {
      const w = WEAPONS[type];
      if (ai.ammo[type] > 0 || ai.budget < w.ammoCost) return;
      if (w.alwaysBuyAmmo || ai.platforms.some(pl => pl.type === type)) buyAmmo(type, ai);
    });
    if (--aiBuyTimer <= 0) {
      aiBuyTimer = CONFIG.aiBuyInterval;
      const launcherCount = ai.platforms.filter(p => p.type === 'launcher').length;
      const aaCount = ai.platforms.filter(p => p.type === 'aa').length;
      const buyType = launcherCount <= aaCount ? 'launcher' : 'aa';
      const cost = WEAPONS[buyType].cost;
      if (ai.budget >= cost) { ai.budget -= cost; aiDeployWeapon(buyType); }
    }
  }
  missiles.forEach(m => {
    if (m.dead) return;
    if (m.isDrone) {
      const enemy = players[1 - m.fromPlayer];
      const distToEnemy = Math.abs(m.x - enemy.cityX);
      const cruiseY = GROUND_Y - DRONE_CRUISE_ALT;
      if (distToEnemy > 60) { m.vy += (cruiseY - m.y) * 0.05; m.vy = Math.max(-3, Math.min(1.5, m.vy)); }
      else { m.vy += CONFIG.gravity * 2.5; }
    } else { m.vy += CONFIG.gravity; }
    m.x += m.vx; m.y += m.vy;
    if (m.x < 0 || m.x >= W || m.y > H + 20) { m.dead = true; return; }
    const explode = (hx, hy) => {
      applyDamage(hx, hy, m.missileType);
      const isNukeType = !!WEAPONS[m.missileType].isNuke;
      explosions.push({ x: hx, y: hy, r: 2, maxR: WEAPONS[m.missileType].explRadius, alpha: 1, nuke: isNukeType, age: 0, phase: 'expand' });
      spawnSmoke(hx, hy, isNukeType ? 35 : 18);
      playSound(ac => sndExplosion(ac, isNukeType));
      m.dead = true;
    };
    if (m.y >= GROUND_Y) { explode(m.x, m.y); return; }
    if (hitsCity(players[1 - m.fromPlayer], m)) explode(m.x, m.y);
  });
  missiles = missiles.filter(m => !m.dead);
  for (let i = pendingAA.length - 1; i >= 0; i--) {
    if (--pendingAA[i].countdown <= 0) { launchInterceptor(pendingAA[i].fromX, pendingAA[i].defIdx); pendingAA.splice(i, 1); }
  }
  interceptors.forEach(ic => {
    if (ic.dead) return;
    const enemyMissiles = missiles.filter(m => m.fromPlayer === 1 - ic.defIdx && !m.dead);
    let nearest = null, nearDist = Infinity;
    enemyMissiles.forEach(m => { const d = Math.hypot(m.x - ic.x, m.y - ic.y); if (d < nearDist) { nearDist = d; nearest = m; } });
    if (!nearest) { ic.dead = true; return; }
    const dx = nearest.x - ic.x, dy = nearest.y - ic.y, d = Math.sqrt(dx*dx + dy*dy) || 1;
    ic.vx += ((dx/d)*CONFIG.interceptSpeed - ic.vx) * 0.10;
    ic.vy += ((dy/d)*CONFIG.interceptSpeed - ic.vy) * 0.10;
    const cs = Math.sqrt(ic.vx**2 + ic.vy**2) || 1;
    ic.vx = (ic.vx/cs)*CONFIG.interceptSpeed; ic.vy = (ic.vy/cs)*CONFIG.interceptSpeed;
    ic.x += ic.vx; ic.y += ic.vy;
    if (nearDist < CONFIG.interceptRadius) {
      explosions.push({ x: nearest.x, y: nearest.y, r: 2, maxR: 10, alpha: 1, nuke: false, age: 0, phase: 'expand' });
      nearest.dead = true; ic.dead = true;
      spawnSmoke(nearest.x, nearest.y, 10);
      playSound(sndIntercept);
    }
    if (ic.x < 0 || ic.x >= W || ic.y > H || ic.y >= GROUND_Y) ic.dead = true;
  });
  interceptors = interceptors.filter(ic => !ic.dead);
  missiles     = missiles.filter(m  => !m.dead);
  if (players[0].hp <= 0) { winner = 1; state = 'gameover'; return; }
  if (players[1].hp <= 0) { winner = 0; state = 'gameover'; return; }
  explosions.forEach(e => {
    e.age++;
    const expandFrames = e.nuke ? 22 : 12, blinkFrames = e.nuke ? 90 : 50, fadeFrames = e.nuke ? 80 : 40;
    if (e.phase === 'expand') {
      e.r += (e.maxR - e.r) * 0.18;
      if (e.age >= expandFrames) { e.phase = 'blink'; e.age = 0; e.r = e.maxR; }
    } else if (e.phase === 'blink') {
      e.alpha = 0.55 + 0.45 * Math.sin(e.age * 0.45);
      if (e.age >= blinkFrames) { e.phase = 'fade'; e.age = 0; }
    } else {
      e.alpha = 1 - e.age / fadeFrames;
    }
  });
  explosions = explosions.filter(e => e.alpha > 0);
  updateSmoke(); updateFires();
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, '#1a1a1a'); g.addColorStop(1, '#2a2a2a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 90; i++) ctx.fillRect((i*173+41)%W, (i*101+13)%(GROUND_Y*0.76), 1, 1);
  const mx = W * 0.72, my = GROUND_Y * 0.18, mr = 13;
  ctx.save();
  ctx.shadowColor = 'rgba(235,230,200,0.8)'; ctx.shadowBlur = 18;
  ctx.fillStyle = 'rgba(235,230,200,1)';
  ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawTerrain() {
  ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
}

function drawWeaponAt(type, cx, sy, right) {
  const w = WEAPONS[type];
  if (!w) return;
  const img = images[w.image], scale = w.imageScale || 0.45;
  const dw = w.imageW * scale, dh = w.imageH * scale;
  ctx.save();
  ctx.translate(cx, sy - dh / 2);
  if (!right) ctx.scale(-1, 1);
  ctx.drawImage(img, -dw / 2, -dh / 2, dw, dh);
  ctx.restore();
}

function drawPlatforms(p) {
  p.platforms.forEach(pl => {
    if (pl.type === 'empty') return;
    ctx.globalAlpha = p.ammo[pl.type] > 0 ? 1 : 0.45;
    drawWeaponAt(pl.type, pl.x, GROUND_Y, pl.pointRight);
    ctx.globalAlpha = 1;
  });
}

function drawBgCity(p) {
  const WIN_COLORS = ['rgba(180,210,240,0.7)', 'rgba(220,190,120,0.5)', 'rgba(200,225,255,0.5)'];
  p.bgBuildings.forEach((b, i) => {
    const bx = p.cityX + b.rx, by = GROUND_Y - b.h;
    ctx.fillStyle = '#161616'; ctx.fillRect(bx - b.w/2, by, b.w, b.h);
    ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 1; ctx.strokeRect(bx - b.w/2, by, b.w, b.h);
    const winColor = WIN_COLORS[i % 3];
    ctx.save();
    for (let wy = by+8; wy < by+b.h-5; wy += 6)
      for (let wx = bx-b.w/2+4; wx < bx+b.w/2-4; wx += 5) {
        const hash = ((wx * 73856093) ^ (wy * 19349663)) >>> 0, lit = (hash % 3) !== 0;
        ctx.shadowColor = lit ? winColor : 'transparent'; ctx.shadowBlur = lit ? 3 : 0;
        ctx.fillStyle = lit ? winColor : '#252525';
        ctx.fillRect(wx, wy, 2, 3);
      }
    ctx.restore();
  });
}

function drawCity(p) {
  const alive = Math.ceil((p.hp / 100) * p.buildings.length);
  const WIN_COLORS = ['rgba(240,165,40,1)', 'rgba(235,235,210,1)', 'rgba(255,220,80,1)'];
  p.buildings.forEach((b, i) => {
    const bx = p.cityX + b.rx, by = GROUND_Y - b.h;
    if (i >= alive) { ctx.fillStyle = '#111'; ctx.fillRect(bx - b.w/2, GROUND_Y-4, b.w, 4); return; }
    ctx.fillStyle = '#111'; ctx.fillRect(bx - b.w/2, by, b.w, b.h);
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.strokeRect(bx - b.w/2, by, b.w, b.h);
    const winColor = WIN_COLORS[i % 3];
    ctx.save();
    for (let wy = by+9; wy < by+b.h-6; wy += 8)
      for (let wx = bx-b.w/2+6; wx < bx+b.w/2-6; wx += 6) {
        const hash = ((wx * 73856093) ^ (wy * 19349663)) >>> 0, lit = (hash % 3) !== 0;
        ctx.shadowColor = lit ? winColor : 'transparent'; ctx.shadowBlur = lit ? 6 : 0;
        ctx.fillStyle = lit ? winColor : '#2e2e2e';
        ctx.fillRect(wx, wy, 3, 4);
      }
    if (i % 3 === 1 && b.h > 28) {
      const lx = bx + b.w/2 - 2, ly = by - 1;
      const flicker = 0.7 + 0.3 * Math.sin(performance.now() / 600 + i);
      ctx.save();
      ctx.shadowColor = `rgba(220,40,40,${0.9*flicker})`; ctx.shadowBlur = 7;
      ctx.fillStyle = `rgba(220,40,40,${flicker})`;
      ctx.beginPath(); ctx.arc(lx, ly, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  });
}

function spawnFire(x, y, isNuke) {
  const spread = isNuke ? 55 : 28, count = isNuke ? 12 : 6;
  for (let i = 0; i < count; i++)
    fires.push({ x: x+(Math.random()-0.5)*spread, y: GROUND_Y, spread, life: 0.7+Math.random()*0.6, phase: Math.random()*Math.PI*2 });
}

function updateFires() {
  fires.forEach(f => { f.life -= 0.0008 + Math.random() * 0.0004; });
  fires = fires.filter(f => f.life > 0);
}

function drawFires() {
  const t = performance.now() / 1000;
  fires.forEach(f => {
    const flicker = 0.6 + 0.4 * Math.sin(t * 8 + f.phase);
    const h = (18 + f.spread * 0.6) * f.life * flicker, r = (6 + f.spread * 0.25) * f.life * flicker;
    const a = Math.min(1, f.life * 1.5);
    const g1 = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y - h*0.4, r);
    g1.addColorStop(0, `rgba(255,200,50,${a*0.9})`); g1.addColorStop(0.4, `rgba(255,80,0,${a*0.7})`); g1.addColorStop(1, `rgba(180,20,0,0)`);
    ctx.beginPath(); ctx.arc(f.x, f.y - h*0.3, r, 0, Math.PI*2); ctx.fillStyle = g1; ctx.fill();
    const g2 = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r*0.4);
    g2.addColorStop(0, `rgba(255,255,200,${a})`); g2.addColorStop(1, `rgba(255,150,0,0)`);
    ctx.beginPath(); ctx.arc(f.x, f.y, r*0.4, 0, Math.PI*2); ctx.fillStyle = g2; ctx.fill();
  });
}

function spawnSmoke(x, y, count) {
  for (let i = 0; i < count; i++)
    smoke.push({ x: x+(Math.random()-0.5)*20, y: y+(Math.random()-0.5)*10, vx: (Math.random()-0.5)*0.12, vy: -(0.03+Math.random()*0.07), r: 6+Math.random()*10, alpha: 0.18+Math.random()*0.12, life: 1.0, decay: 0.0006+Math.random()*0.0004 });
}

function updateSmoke() {
  smoke.forEach(s => { s.x += s.vx; s.y += s.vy; s.r += 0.04; s.life -= s.decay; s.alpha = s.life * 0.22; });
  smoke = smoke.filter(s => s.life > 0);
}

function drawSmoke() {
  smoke.forEach(s => {
    const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r);
    g.addColorStop(0, `rgba(90,90,90,${s.alpha})`); g.addColorStop(0.5, `rgba(60,60,60,${s.alpha*0.5})`); g.addColorStop(1, `rgba(40,40,40,0)`);
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill();
  });
}

function drawFireball(x, y, r, inner, outer) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, `rgba(255,255,200,1)`); g.addColorStop(0.25, inner); g.addColorStop(0.7, outer); g.addColorStop(1, `rgba(0,0,0,0)`);
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill();
}

function drawMissiles() {
  missiles.forEach(m => drawFireball(m.x, m.y, m.isNuke ? 10 : 6, `rgba(255,120,0,1)`, `rgba(180,40,0,0)`));
}

function drawInterceptors() {
  interceptors.forEach(ic => drawFireball(ic.x, ic.y, 4, `rgba(255,120,0,1)`, `rgba(180,40,0,0)`));
}

function drawExplosions() {
  explosions.forEach(({ x, y, r, alpha }) => {
    const a = Math.max(0, Math.min(1, alpha));
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, `rgba(255,255,200,${a})`); g.addColorStop(0.3, `rgba(255,160,0,${a})`);
    g.addColorStop(0.7, `rgba(200,40,0,${a*0.8})`); g.addColorStop(1, `rgba(80,10,0,0)`);
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill();
  });
}

function drawShop() {
  const p = players[0];
  SHOP_COLS.forEach((types, col) => {
    const sr = shopRect(col);
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(sr.x, sr.y, sr.w, sr.h);
    ctx.strokeStyle = '#37474f'; ctx.lineWidth = 1; ctx.strokeRect(sr.x, sr.y, sr.w, sr.h);
    types.forEach((type, i) => {
      const w = WEAPONS[type], rowY = sr.y + 14 + i * SHOP_ROW_H, canBuy = p.budget >= w.cost;
      if (i > 0) {
        ctx.strokeStyle = '#2a3a42'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(sr.x + 4, rowY - 3); ctx.lineTo(sr.x + sr.w - 4, rowY - 3); ctx.stroke();
      }
      // Icon background
      ctx.fillStyle = '#3a3a3a'; ctx.fillRect(sr.x + 4, rowY + 2, 40, 38);
      ctx.globalAlpha = canBuy ? 1 : 0.4;
      drawWeaponAt(type, sr.x + 24, rowY + 21, true);
      ctx.globalAlpha = 1;
      // Label + cost
      ctx.textAlign = 'left';
      ctx.font = 'bold 11px monospace'; ctx.fillStyle = canBuy ? '#fff' : '#555';
      ctx.fillText(w.label, sr.x + 50, rowY + 13);
      ctx.font = '9px monospace'; ctx.fillStyle = canBuy ? '#ccc' : '#555';
      ctx.fillText(`${fmt(w.cost)} / ${fmt(w.ammoCost / w.ammoPack)}`, sr.x + 50, rowY + 24);
      // Frequency slider (offensive weapons only)
      if (!w.defensive) {
        const sl = sliderRect(type), freq = fireState[type].freq;
        const deployed = p.platforms.some(pl => pl.type === type);
        ctx.globalAlpha = deployed ? 1 : 0.25;
        ctx.fillStyle = '#2a2a2a'; ctx.fillRect(sl.x, sl.y, sl.w, sl.h);
        ctx.fillStyle = '#fff'; ctx.fillRect(sl.x, sl.y, sl.w * freq, sl.h);
        ctx.beginPath(); ctx.arc(sl.x + sl.w * freq, sl.y + sl.h / 2, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#fff'; ctx.fill();
        ctx.globalAlpha = 1;
      }
    });
  });
}

function drawDrag() {
  if (!drag) return;
  ctx.globalAlpha = 0.82;
  drawWeaponAt(drag.type, drag.x, drag.y, true);
  ctx.globalAlpha = 1;
  // Highlight valid drop platforms
  players[0].platforms.filter(pl => pl.type !== drag.type).forEach(pl => {
    ctx.save(); ctx.strokeStyle = 'rgba(255,255,100,0.5)'; ctx.lineWidth = 1.5; ctx.setLineDash([3, 3]);
    ctx.strokeRect(pl.x - CONFIG.platformW, GROUND_Y - 32, CONFIG.platformW * 2, 32);
    ctx.setLineDash([]); ctx.restore();
  });
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.60)'; ctx.fillRect(0, 0, W, 44);
  const bw = Math.min(200, W * 0.28), bh = 10, margin = 10, barY = 8;
  players.forEach((p, i) => {
    const ratio = p.hp / 100, barX = i === 0 ? margin : W - margin - bw;
    ctx.fillStyle = '#111'; ctx.fillRect(barX, barY, bw, bh);
    ctx.fillStyle = ratio > 0.5 ? '#4caf50' : ratio > 0.25 ? '#ff9800' : '#f44336';
    ctx.fillRect(barX, barY, bw * ratio, bh);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.strokeRect(barX, barY, bw, bh);
    ctx.font = 'bold 10px monospace'; ctx.fillStyle = '#ccc';
    ctx.textAlign = i === 0 ? 'left' : 'right';
    ctx.fillText(`${p.name}  ${p.hp}%`, i === 0 ? barX : barX + bw, barY + bh + 12);
  });
  ctx.textAlign = 'center'; ctx.font = 'bold 20px monospace'; ctx.fillStyle = '#fff';
  ctx.fillText(fmt(players[0].budget), W / 2, 28);
  if (flashMsg) {
    ctx.textAlign = 'center'; ctx.font = 'bold 13px monospace'; ctx.fillStyle = flashMsg.color;
    ctx.globalAlpha = Math.min(1, flashMsg.ttl / 25);
    ctx.fillText(flashMsg.text, W / 2, 44);
    ctx.globalAlpha = 1;
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0, 0, W, H);
  const p = players[winner];
  ctx.textAlign = 'center'; ctx.font = 'bold 44px monospace'; ctx.fillStyle = p.color;
  ctx.fillText(`${p.name} WINS`, W / 2, H / 2 - 16);
  ctx.font = '16px monospace'; ctx.fillStyle = '#999';
  ctx.fillText('Tap to play again', W / 2, H / 2 + 28);
}

function drawStartScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.78)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.font = 'bold 52px monospace'; ctx.fillStyle = '#e0e0e0';
  ctx.fillText('SHAHED', W / 2, H / 2 - 40);
  ctx.font = '15px monospace'; ctx.fillStyle = '#666';
  ctx.fillText('By Ruben Tous', W / 2, H / 2 - 12);
  // PLAY button
  const btn = playBtnRect();
  ctx.fillStyle = '#4dd0e1';
  ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
  ctx.font = 'bold 22px monospace'; ctx.fillStyle = '#000';
  ctx.fillText('PLAY', W / 2, btn.y + btn.h * 0.67);
  // Landscape notice
  ctx.font = '11px monospace'; ctx.fillStyle = '#555';
  ctx.fillText('Hold your phone in landscape position', W / 2, btn.y + btn.h + 22);
}

// ─── Loop ─────────────────────────────────────────────────────────────────────
function loop() {
  if (state !== 'start') update();
  drawSky(); drawTerrain();
  drawPlatforms(players[0]); drawPlatforms(players[1]);
  players.forEach(drawBgCity); players.forEach(drawCity);
  drawSmoke(); drawFires(); drawMissiles(); drawInterceptors(); drawExplosions();
  if (state === 'start') {
    drawStartScreen();
  } else if (state !== 'gameover') {
    drawHUD();
    if (state === 'playing') { drawShop(); drawDrag(); }
  } else {
    drawGameOver();
  }
  requestAnimationFrame(loop);
}

initGame();
state = 'start';
loop();
</script>
